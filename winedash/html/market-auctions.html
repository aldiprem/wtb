<!-- winedash/html/market-auctions.html - VERSI DIPERBAIKI -->

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Winedash - Auctions Market</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/winedash/css/web.css">
    <link rel="stylesheet" href="/winedash/css/storage.css">
    <link rel="stylesheet" href="/winedash/css/auctions.css">
    <link rel="stylesheet" href="/winedash/css/auctions-activity.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TON Connect UI SDK -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="storage-container">

        <!-- Header dengan bottom navigation style -->
        <div class="storage-bottom-nav" style="position: relative; margin-bottom: 20px;">
            <div class="nav-circle" id="backToMarketBtn">
                <i class="fas fa-store"></i>
            </div>
            <div class="nav-links-container">
                <button class="nav-link active" data-market-activity-tab="global-auctions" id="globalAuctionsTabBtn">
                    <i class="fas fa-globe"></i>
                    <span>Global Auctions</span>
                </button>
                <button class="nav-link" data-market-activity-tab="my-bids" id="myBidsTabBtn">
                    <i class="fas fa-history"></i>
                    <span>My Bids</span>
                </button>
            </div>
        </div>

        <!-- HAPUS bagian title ini -->
        <!-- <div style="text-align: center; margin-bottom: 16px;">
            <h2 style="font-size: 20px; font-weight: 700;">
                <i class="fas fa-gavel" style="color: var(--primary); margin-right: 8px;"></i>
                Market Auctions
            </h2>
            <p style="font-size: 12px; color: var(--text-muted);">Bid on premium usernames</p>
        </div> -->

        <!-- Action Row untuk Auctions Market -->
        <div class="action-row">
            <button class="action-btn add-action-btn" id="refreshAuctionsBtn">
                <i class="fas fa-sync-alt"></i>
                <span>Refresh</span>
            </button>
            <button class="action-btn" id="marketAuctionsFilterBtn">
                <i class="fas fa-filter"></i>
                <span>Filter</span>
            </button>
            <div class="layout-toggle">
                <button class="layout-btn active" data-layout="grid" id="marketAuctionsGridBtn">
                    <i class="fas fa-th"></i>
                </button>
                <button class="layout-btn" data-layout="list" id="marketAuctionsListBtn">
                    <i class="fas fa-list"></i>
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" class="search-input" id="marketAuctionsSearchInput" placeholder="🔍 Cari username...">
            <button class="search-apply-btn" id="marketAuctionsSearchApplyBtn">Apply</button>
        </div>

        <!-- Filter Dropdown -->
        <div id="marketAuctionsFilterDropdown" class="status-dropdown" style="display: none; position: fixed; z-index: 1700;">
            <div class="status-dropdown-item active" data-market-auctions-filter="active">
                <i class="fas fa-fire"></i> Active Auctions
            </div>
            <div class="status-dropdown-item" data-market-auctions-filter="all">
                <i class="fas fa-list"></i> All Auctions
            </div>
            <div class="status-dropdown-item" data-market-auctions-filter="ended">
                <i class="fas fa-check-circle"></i> Ended Auctions
            </div>
        </div>

        <!-- Auctions Container -->
        <div id="marketAuctionsContainer" style="width: 100%; min-height: 400px;">
            <div class="loading-placeholder">Memuat auctions...</div>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="/winedash/js/market-auctions.js"></script>
    
    <!-- Debug Client -->
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isDebugMode = urlParams.get('debug') === '1' || localStorage.getItem('debug_mode') === 'true';
            if (isDebugMode) {
                const script = document.createElement('script');
                script.src = '/winedash/js/debug-client.js';
                document.head.appendChild(script);
                console.log('[DEBUG] Debug mode enabled - logs will be sent to server');
            }
        })();
    </script>

</body>
</html>

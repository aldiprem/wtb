<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Winedash Debug Console</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/winedash/css/debug.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <div class="debug-header">
        <h1><i class="fas fa-bug"></i> Winedash Debug Console</h1>
        <div class="user-info">
            <span class="user-id" id="userIdDisplay">No user selected</span>
            <select id="userSelect" class="user-select">
                <option value="">-- Loading users --</option>
            </select>
            <button class="btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn" id="clearConsoleBtn">Clear Console</button>
            <button class="btn" id="clearNetworkBtn">Clear Network</button>
            <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
            <button class="btn btn-warning" id="refreshToggleBtn">Pause</button>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="debug-tabs">
        <button class="debug-tab active" data-tab="console">
            <i class="fas fa-terminal"></i> Console Logs
        </button>
        <button class="debug-tab" data-tab="network">
            <i class="fas fa-network-wired"></i> Network
        </button>
        <button class="debug-tab" data-tab="storage">
            <i class="fas fa-database"></i> Storage
        </button>
    </div>
    
    <!-- Main Content -->
    <div class="debug-content">
        <!-- Console Panel -->
        <div class="console-panel" id="consolePanel">
            <div class="panel-toolbar">
                <input type="text" id="consoleFilter" class="panel-filter" placeholder="Filter console logs...">
                <div class="filter-group">
                    <button class="filter-group-btn active" data-console-filter="all">All</button>
                    <button class="filter-group-btn" data-console-filter="log">Log</button>
                    <button class="filter-group-btn" data-console-filter="info">Info</button>
                    <button class="filter-group-btn" data-console-filter="warn">Warn</button>
                    <button class="filter-group-btn" data-console-filter="error">Error</button>
                </div>
            </div>
            <div class="logs-list" id="consoleList">
                <div class="loading-placeholder">Select a user to view console logs</div>
            </div>
        </div>
        
        <!-- Network Panel -->
        <div class="network-panel hidden" id="networkPanel">
            <div class="panel-toolbar">
                <input type="text" id="networkFilter" class="panel-filter" placeholder="Filter by URL or method...">
                <div class="filter-group">
                    <button class="filter-group-btn active" data-network-filter="all">All</button>
                    <button class="filter-group-btn" data-network-filter="GET">GET</button>
                    <button class="filter-group-btn" data-network-filter="POST">POST</button>
                    <button class="filter-group-btn" data-network-filter="error">Errors</button>
                </div>
            </div>
            <div class="network-table" id="networkList">
                <div class="loading-placeholder">Select a user to view network requests</div>
            </div>
        </div>
        
        <!-- Storage Panel -->
        <div class="storage-panel hidden" id="storagePanel">
            <div class="panel-toolbar">
                <input type="text" id="storageFilter" class="panel-filter" placeholder="Filter storage keys...">
            </div>
            <div class="storage-table" id="storageList">
                <div class="loading-placeholder">Select a user to view storage data</div>
            </div>
        </div>
        
        <!-- Detail Panel (Right Side) -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header" id="detailTitle">Select a request</div>
            <div class="detail-content" id="detailContent">
                <div class="detail-section">
                    <div class="detail-section-title">Request</div>
                    <div class="detail-json" id="detailRequest">-</div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Response</div>
                    <div class="detail-json" id="detailResponse">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <span id="statusText">Debug console ready</span>
        <span id="statsText">Console: 0 | Network: 0</span>
    </div>
    
    <!-- JavaScript -->
    <script src="/winedash/js/debug.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winedash Debug Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        .debug-header {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .debug-header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .debug-header h1 i {
            color: #40a7e3;
            margin-right: 8px;
        }
        
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .user-id {
            background: #3d3d3d;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
        }
        
        .clear-btn {
            background: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .clear-btn:hover {
            background: #dc2626;
        }
        
        /* Tabs */
        .debug-tabs {
            display: flex;
            background: #252525;
            border-bottom: 1px solid #3d3d3d;
            flex-shrink: 0;
        }
        
        .debug-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 13px;
            font-family: monospace;
            transition: all 0.2s;
        }
        
        .debug-tab.active {
            color: #40a7e3;
            border-bottom: 2px solid #40a7e3;
            background: rgba(64, 167, 227, 0.1);
        }
        
        .debug-tab:hover {
            background: #333;
        }
        
        /* Main Content */
        .debug-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* Console Panel */
        .console-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .console-toolbar {
            padding: 8px 12px;
            background: #252525;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .console-filter {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            padding: 6px 12px;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .console-filter:focus {
            outline: none;
            border-color: #40a7e3;
        }
        
        .filter-btns {
            display: flex;
            gap: 5px;
        }
        
        .filter-btn {
            background: #333;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 11px;
        }
        
        .filter-btn.active {
            background: #40a7e3;
            color: white;
        }
        
        .console-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }
        
        .console-entry {
            font-family: monospace;
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 3px solid;
            background: #252525;
            word-break: break-all;
        }
        
        .console-entry.log { border-left-color: #a0a0a0; }
        .console-entry.info { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .console-entry.warn { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .console-entry.error { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        
        .console-time {
            color: #6b6b6b;
            font-size: 10px;
            margin-right: 10px;
        }
        
        .console-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .console-type.log { background: #3d3d3d; color: #a0a0a0; }
        .console-type.info { background: #3b82f6; color: white; }
        .console-type.warn { background: #f59e0b; color: #1a1a1a; }
        .console-type.error { background: #ef4444; color: white; }
        
        .console-message {
            color: #e0e0e0;
        }
        
        /* Network Panel */
        .network-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .network-toolbar {
            padding: 8px 12px;
            background: #252525;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .network-filter {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            padding: 6px 12px;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .network-table {
            flex: 1;
            overflow-y: auto;
        }
        
        .network-row {
            display: grid;
            grid-template-columns: 80px 100px 1fr 80px 100px;
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            font-size: 11px;
            font-family: monospace;
            cursor: pointer;
        }
        
        .network-row:hover {
            background: #2a2a2a;
        }
        
        .network-header {
            background: #252525;
            color: #a0a0a0;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        
        .network-method {
            font-weight: bold;
        }
        
        .network-method.GET { color: #10b981; }
        .network-method.POST { color: #f59e0b; }
        .network-method.PUT { color: #3b82f6; }
        .network-method.DELETE { color: #ef4444; }
        
        .network-status.success { color: #10b981; }
        .network-status.error { color: #ef4444; }
        
        /* Detail Panel */
        .detail-panel {
            width: 400px;
            background: #252525;
            border-left: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .detail-header {
            padding: 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #3d3d3d;
            font-weight: bold;
        }
        
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 11px;
        }
        
        .detail-section {
            margin-bottom: 16px;
        }
        
        .detail-section-title {
            color: #40a7e3;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #3d3d3d;
        }
        
        .detail-json {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 10px;
        }
        
        /* Status */
        .status-bar {
            background: #2d2d2d;
            padding: 6px 12px;
            border-top: 1px solid #3d3d3d;
            font-size: 11px;
            color: #a0a0a0;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #a0a0a0;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d4d;
        }
        
        /* Hide panels */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="debug-header">
        <h1><i class="fas fa-bug"></i> Winedash Debug Console</h1>
        <div class="user-info">
            <span class="user-id" id="userIdDisplay">Loading...</span>
            <button class="clear-btn" id="clearConsoleBtn">Clear Console</button>
            <button class="clear-btn" id="clearNetworkBtn" style="background: #6b6b6b;">Clear Network</button>
        </div>
    </div>
    
    <div class="debug-tabs">
        <button class="debug-tab active" data-tab="console">Console Logs</button>
        <button class="debug-tab" data-tab="network">Network Requests</button>
        <button class="debug-tab" data-tab="storage">Storage Data</button>
    </div>
    
    <div class="debug-content">
        <!-- Console Panel -->
        <div class="console-panel" id="consolePanel">
            <div class="console-toolbar">
                <input type="text" class="console-filter" id="consoleFilter" placeholder="Filter logs...">
                <div class="filter-btns">
                    <button class="filter-btn" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="log">Log</button>
                    <button class="filter-btn" data-filter="info">Info</button>
                    <button class="filter-btn" data-filter="warn">Warn</button>
                    <button class="filter-btn" data-filter="error">Error</button>
                </div>
            </div>
            <div class="console-list" id="consoleList">
                <div class="loading">Waiting for console logs...</div>
            </div>
        </div>
        
        <!-- Network Panel -->
        <div class="network-panel hidden" id="networkPanel">
            <div class="network-toolbar">
                <input type="text" class="network-filter" id="networkFilter" placeholder="Filter by URL or method...">
                <div class="filter-btns">
                    <button class="filter-btn" data-method="all">All</button>
                    <button class="filter-btn" data-method="GET">GET</button>
                    <button class="filter-btn" data-method="POST">POST</button>
                    <button class="filter-btn" data-method="error">Errors</button>
                </div>
            </div>
            <div class="network-table" id="networkTable">
                <div class="network-row network-header">
                    <div>Time</div>
                    <div>Method</div>
                    <div>URL</div>
                    <div>Status</div>
                    <div>Duration</div>
                </div>
                <div id="networkList">
                    <div class="loading">Waiting for network requests...</div>
                </div>
            </div>
        </div>
        
        <!-- Storage Panel -->
        <div class="network-panel hidden" id="storagePanel">
            <div class="network-toolbar">
                <input type="text" class="network-filter" id="storageFilter" placeholder="Filter keys...">
                <button class="clear-btn" id="clearStorageBtn" style="background: #ef4444;">Clear All Storage</button>
            </div>
            <div class="network-table" id="storageTable">
                <div class="network-row network-header">
                    <div>Key</div>
                    <div>Value</div>
                </div>
                <div id="storageList">
                    <div class="loading">Loading storage data...</div>
                </div>
            </div>
        </div>
        
        <!-- Detail Panel -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header" id="detailTitle">Select a request</div>
            <div class="detail-content" id="detailContent">
                <div class="detail-section">
                    <div class="detail-section-title">Request</div>
                    <div class="detail-json" id="detailRequest">-</div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Response</div>
                    <div class="detail-json" id="detailResponse">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="statusText">Ready</span>
        <span id="statsText">Console: 0 | Network: 0</span>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script>
        (function() {
            const API_BASE_URL = window.location.origin;
            
            // State
            let telegramUser = null;
            let consoleLogs = [];
            let networkRequests = [];
            let currentTab = 'console';
            let consoleFilter = '';
            let consoleTypeFilter = 'all';
            let networkFilter = '';
            let networkMethodFilter = 'all';
            let currentSelectedRequest = null;
            let refreshInterval = null;
            
            // DOM Elements
            const consoleList = document.getElementById('consoleList');
            const networkList = document.getElementById('networkList');
            const storageList = document.getElementById('storageList');
            const consoleFilterInput = document.getElementById('consoleFilter');
            const networkFilterInput = document.getElementById('networkFilter');
            const storageFilterInput = document.getElementById('storageFilter');
            const statusText = document.getElementById('statusText');
            const statsText = document.getElementById('statsText');
            const userIdDisplay = document.getElementById('userIdDisplay');
            
            // ==================== UTILITY ====================
            
            function formatTime() {
                return new Date().toLocaleTimeString('id-ID', { hour12: false });
            }
            
            function formatDuration(startTime) {
                if (!startTime) return '-';
                const duration = Date.now() - startTime;
                return `${duration}ms`;
            }
            
            // ==================== GET TELEGRAM USER ====================
            
            function getTelegramUserFromWebApp() {
                try {
                    if (window.Telegram && window.Telegram.WebApp) {
                        const initData = window.Telegram.WebApp.initDataUnsafe;
                        if (initData && initData.user) {
                            return {
                                id: initData.user.id,
                                username: initData.user.username || '',
                                first_name: initData.user.first_name || '',
                                last_name: initData.user.last_name || '',
                                photo_url: initData.user.photo_url || null
                            };
                        }
                    }
                    const urlParams = new URLSearchParams(window.location.search);
                    const userId = urlParams.get('user_id');
                    if (userId) {
                        return { id: parseInt(userId), username: 'debug_user', first_name: 'Debug', last_name: 'User' };
                    }
                    return null;
                } catch (error) {
                    console.error('Error getting Telegram user:', error);
                    return null;
                }
            }
            
            // ==================== FETCH CONSOLE LOGS FROM SERVER ====================
            
            async function fetchConsoleLogs() {
                if (!telegramUser) return;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/winedash/debug/console/${telegramUser.id}`);
                    const data = await response.json();
                    
                    if (data.success && data.logs) {
                        consoleLogs = data.logs;
                        renderConsoleLogs();
                        updateStats();
                    }
                } catch (error) {
                    console.error('Error fetching console logs:', error);
                }
            }
            
            // ==================== FETCH NETWORK REQUESTS FROM SERVER ====================
            
            async function fetchNetworkRequests() {
                if (!telegramUser) return;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/winedash/debug/network/${telegramUser.id}`);
                    const data = await response.json();
                    
                    if (data.success && data.requests) {
                        networkRequests = data.requests;
                        renderNetworkRequests();
                        updateStats();
                    }
                } catch (error) {
                    console.error('Error fetching network requests:', error);
                }
            }
            
            // ==================== FETCH STORAGE DATA ====================
            
            async function fetchStorageData() {
                if (!telegramUser) return;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/winedash/debug/storage/${telegramUser.id}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        renderStorageData(data);
                        updateStats();
                    }
                } catch (error) {
                    console.error('Error fetching storage data:', error);
                }
            }
            
            // ==================== RENDER CONSOLE LOGS ====================
            
            function renderConsoleLogs() {
                if (!consoleList) return;
                
                let filtered = [...consoleLogs];
                
                if (consoleFilter) {
                    filtered = filtered.filter(log => 
                        log.message.toLowerCase().includes(consoleFilter.toLowerCase())
                    );
                }
                
                if (consoleTypeFilter !== 'all') {
                    filtered = filtered.filter(log => log.type === consoleTypeFilter);
                }
                
                if (filtered.length === 0) {
                    consoleList.innerHTML = '<div class="loading">No console logs</div>';
                    return;
                }
                
                let html = '';
                for (const log of filtered) {
                    const time = new Date(log.timestamp).toLocaleTimeString('id-ID');
                    html += `
                        <div class="console-entry ${log.type}">
                            <span class="console-time">${time}</span>
                            <span class="console-type ${log.type}">${log.type.toUpperCase()}</span>
                            <span class="console-message">${escapeHtml(log.message)}</span>
                        </div>
                    `;
                }
                
                consoleList.innerHTML = html;
            }
            
            // ==================== RENDER NETWORK REQUESTS ====================
            
            function renderNetworkRequests() {
                if (!networkList) return;
                
                let filtered = [...networkRequests];
                
                if (networkFilter) {
                    filtered = filtered.filter(req => 
                        req.url.toLowerCase().includes(networkFilter.toLowerCase()) ||
                        req.method.toLowerCase().includes(networkFilter.toLowerCase())
                    );
                }
                
                if (networkMethodFilter !== 'all') {
                    if (networkMethodFilter === 'error') {
                        filtered = filtered.filter(req => req.status >= 400);
                    } else {
                        filtered = filtered.filter(req => req.method === networkMethodFilter);
                    }
                }
                
                if (filtered.length === 0) {
                    networkList.innerHTML = '<div class="loading">No network requests</div>';
                    return;
                }
                
                let html = '';
                for (const req of filtered) {
                    const time = new Date(req.timestamp).toLocaleTimeString('id-ID');
                    const statusClass = req.status >= 200 && req.status < 400 ? 'success' : 'error';
                    
                    html += `
                        <div class="network-row" data-request-id="${req.id}" onclick="window.showRequestDetail(${req.id})">
                            <div>${time}</div>
                            <div class="network-method ${req.method}">${req.method}</div>
                            <div>${escapeHtml(req.url.length > 50 ? req.url.slice(0, 50) + '...' : req.url)}</div>
                            <div class="network-status ${statusClass}">${req.status || 'pending'}</div>
                            <div>${req.duration || '-'}</div>
                        </div>
                    `;
                }
                
                networkList.innerHTML = html;
            }
            
            // ==================== RENDER STORAGE DATA ====================
            
            function renderStorageData(data) {
                if (!storageList) return;
                
                const filter = storageFilterInput?.value.toLowerCase() || '';
                
                let html = '';
                
                // Local Storage
                if (data.localStorage && Object.keys(data.localStorage).length > 0) {
                    for (const [key, value] of Object.entries(data.localStorage)) {
                        if (filter && !key.toLowerCase().includes(filter) && !value.toLowerCase().includes(filter)) continue;
                        html += `
                            <div class="network-row">
                                <div style="font-family: monospace; font-size: 11px;">${escapeHtml(key)}</div>
                                <div style="font-family: monospace; font-size: 10px; color: #10b981; word-break: break-all;">${escapeHtml(value.length > 100 ? value.slice(0, 100) + '...' : value)}</div>
                            </div>
                        `;
                    }
                }
                
                // Session Storage
                if (data.sessionStorage && Object.keys(data.sessionStorage).length > 0) {
                    for (const [key, value] of Object.entries(data.sessionStorage)) {
                        if (filter && !key.toLowerCase().includes(filter) && !value.toLowerCase().includes(filter)) continue;
                        html += `
                            <div class="network-row">
                                <div style="font-family: monospace; font-size: 11px;">[S] ${escapeHtml(key)}</div>
                                <div style="font-family: monospace; font-size: 10px; color: #f59e0b; word-break: break-all;">${escapeHtml(value.length > 100 ? value.slice(0, 100) + '...' : value)}</div>
                            </div>
                        `;
                    }
                }
                
                if (html === '') {
                    storageList.innerHTML = '<div class="loading">No storage data</div>';
                } else {
                    storageList.innerHTML = html;
                }
            }
            
            // ==================== SHOW REQUEST DETAIL ====================
            
            window.showRequestDetail = function(requestId) {
                const request = networkRequests.find(r => r.id === requestId);
                if (!request) return;
                
                currentSelectedRequest = request;
                
                const detailTitle = document.getElementById('detailTitle');
                const detailRequest = document.getElementById('detailRequest');
                const detailResponse = document.getElementById('detailResponse');
                
                if (detailTitle) {
                    detailTitle.innerHTML = `<i class="fas fa-exchange-alt"></i> ${request.method} ${request.url.split('/').pop()}`;
                }
                
                if (detailRequest) {
                    let requestHtml = `<strong>URL:</strong> ${escapeHtml(request.url)}<br><br>`;
                    requestHtml += `<strong>Method:</strong> ${request.method}<br><br>`;
                    requestHtml += `<strong>Timestamp:</strong> ${new Date(request.timestamp).toLocaleString()}<br><br>`;
                    if (request.requestBody) {
                        requestHtml += `<strong>Request Body:</strong><br><pre style="background:#1a1a1a;padding:8px;border-radius:4px;overflow-x:auto;">${escapeHtml(JSON.stringify(request.requestBody, null, 2))}</pre>`;
                    }
                    detailRequest.innerHTML = requestHtml;
                }
                
                if (detailResponse) {
                    let responseHtml = `<strong>Status:</strong> ${request.status || 'pending'}<br><br>`;
                    if (request.responseBody) {
                        responseHtml += `<strong>Response Body:</strong><br><pre style="background:#1a1a1a;padding:8px;border-radius:4px;overflow-x:auto;">${escapeHtml(JSON.stringify(request.responseBody, null, 2))}</pre>`;
                    }
                    detailResponse.innerHTML = responseHtml;
                }
            };
            
            // ==================== UPDATE STATS ====================
            
            function updateStats() {
                statsText.innerHTML = `Console: ${consoleLogs.length} | Network: ${networkRequests.length}`;
            }
            
            // ==================== CLEAR FUNCTIONS ====================
            
            async function clearConsole() {
                if (!telegramUser) return;
                try {
                    await fetch(`${API_BASE_URL}/api/winedash/debug/console/clear/${telegramUser.id}`, { method: 'POST' });
                    consoleLogs = [];
                    renderConsoleLogs();
                    updateStats();
                    statusText.innerHTML = 'Console cleared';
                } catch (error) {
                    console.error('Error clearing console:', error);
                }
            }
            
            async function clearNetwork() {
                if (!telegramUser) return;
                try {
                    await fetch(`${API_BASE_URL}/api/winedash/debug/network/clear/${telegramUser.id}`, { method: 'POST' });
                    networkRequests = [];
                    renderNetworkRequests();
                    updateStats();
                    statusText.innerHTML = 'Network logs cleared';
                } catch (error) {
                    console.error('Error clearing network:', error);
                }
            }
            
            async function clearStorage() {
                if (!telegramUser) return;
                try {
                    await fetch(`${API_BASE_URL}/api/winedash/debug/storage/clear/${telegramUser.id}`, { method: 'POST' });
                    await fetchStorageData();
                    statusText.innerHTML = 'Storage cleared';
                } catch (error) {
                    console.error('Error clearing storage:', error);
                }
            }
            
            // ==================== ESCAPE HTML ====================
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // ==================== TAB SWITCHING ====================
            
            function switchTab(tab) {
                currentTab = tab;
                
                document.querySelectorAll('.debug-tab').forEach(btn => {
                    if (btn.dataset.tab === tab) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                
                document.getElementById('consolePanel').classList.toggle('hidden', tab !== 'console');
                document.getElementById('networkPanel').classList.toggle('hidden', tab !== 'network');
                document.getElementById('storagePanel').classList.toggle('hidden', tab !== 'storage');
                
                if (tab === 'console') {
                    renderConsoleLogs();
                } else if (tab === 'network') {
                    renderNetworkRequests();
                } else if (tab === 'storage') {
                    fetchStorageData();
                }
            }
            
            // ==================== START AUTO REFRESH ====================
            
            function startAutoRefresh() {
                if (refreshInterval) clearInterval(refreshInterval);
                
                refreshInterval = setInterval(() => {
                    if (currentTab === 'console') {
                        fetchConsoleLogs();
                    } else if (currentTab === 'network') {
                        fetchNetworkRequests();
                    } else if (currentTab === 'storage') {
                        fetchStorageData();
                    }
                }, 5000);
            }
            
            // ==================== INITIALIZATION ====================
            
            async function init() {
                telegramUser = getTelegramUserFromWebApp();
                
                if (telegramUser) {
                    userIdDisplay.innerHTML = `User ID: ${telegramUser.id}${telegramUser.username ? ` (@${telegramUser.username})` : ''}`;
                    statusText.innerHTML = `Connected as user ${telegramUser.id}`;
                    
                    await fetchConsoleLogs();
                    await fetchNetworkRequests();
                    startAutoRefresh();
                } else {
                    userIdDisplay.innerHTML = 'No user detected';
                    statusText.innerHTML = 'No Telegram user detected. Please open via Telegram WebApp or add ?user_id=xxx to URL';
                    consoleList.innerHTML = '<div class="loading">No user detected. Please open via Telegram WebApp</div>';
                    networkList.innerHTML = '<div class="loading">No user detected</div>';
                }
                
                // Setup event listeners
                document.querySelectorAll('.debug-tab').forEach(btn => {
                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });
                
                document.getElementById('clearConsoleBtn')?.addEventListener('click', clearConsole);
                document.getElementById('clearNetworkBtn')?.addEventListener('click', clearNetwork);
                document.getElementById('clearStorageBtn')?.addEventListener('click', clearStorage);
                
                consoleFilterInput?.addEventListener('input', (e) => {
                    consoleFilter = e.target.value;
                    renderConsoleLogs();
                });
                
                networkFilterInput?.addEventListener('input', (e) => {
                    networkFilter = e.target.value;
                    renderNetworkRequests();
                });
                
                storageFilterInput?.addEventListener('input', () => {
                    fetchStorageData();
                });
                
                document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const filter = btn.dataset.filter;
                        consoleTypeFilter = filter;
                        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderConsoleLogs();
                    });
                });
                
                document.querySelectorAll('.filter-btn[data-method]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const method = btn.dataset.method;
                        networkMethodFilter = method;
                        document.querySelectorAll('.filter-btn[data-method]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderNetworkRequests();
                    });
                });
                
                // Activate first filter
                document.querySelector('.filter-btn[data-filter="all"]')?.classList.add('active');
                document.querySelector('.filter-btn[data-method="all"]')?.classList.add('active');
            }
            
            // Start
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>

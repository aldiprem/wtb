<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Winedash - Marketplace Username Telegram</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/winedash/css/web.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TON Connect UI SDK (WAJIB) -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="winedash-container">
                
        <!-- Profile Header - Hanya avatar tanpa teks -->
        <div class="profile-header">
            <div class="profile-avatar" id="userAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-balance" id="balanceCard">
                <!-- Konten akan diisi JS -->
            </div>
        </div>

        <!-- Tab Content: Marketplace -->
        <div class="tab-content active" id="marketplaceTab">

            <div id="emptyMarketplaceAnimation" style="display: none;">
                <div class="empty-state">
                    <div class="empty-animation" id="marketplaceEmptyAnimation"></div>
                    <div class="empty-title">No Usernames Available</div>
                    <div class="empty-subtitle">Be the first to list your username!</div>
                </div>
            </div>

            <!-- Search container DIPINDAHKAN KE DALAM MARKETPLACE TAB -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchUsername" placeholder="🔍 Cari username...">
                <button class="search-apply-btn" id="searchApplyBtn">Apply</button>
                <button class="filter-btn" id="marketplaceFilterBtn">
                    <i class="fas fa-sliders-h"></i> Filter
                </button>
            </div>
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-fire"></i>
                    <h3>Username Populer</h3>
                </div>
                <div class="username-list" id="usernameList">
                    <div class="loading-placeholder">Memuat username...</div>
                </div>
            </div>
        </div>

        <!-- Tab Content: My Usernames -->
        <div class="tab-content" id="myUsernamesTab">
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-tag"></i>
                    <h3>Username Saya</h3>
                </div>
                <div class="purchased-list" id="purchasedList">
                    <div class="loading-placeholder">Memuat...</div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-plus-circle"></i>
                    <h3>Jual Username</h3>
                </div>
                <div class="sell-form">
                    <input type="text" id="sellUsername" placeholder="Username (contoh: @username)" class="form-input">
                    <input type="number" id="sellPrice" placeholder="Harga (TON)" class="form-input" step="0.1" min="0.1">
                    <select id="sellCategory" class="form-input">
                        <option value="default">Default</option>
                        <option value="premium">Premium</option>
                        <option value="vip">VIP</option>
                        <option value="rare">Langka</option>
                    </select>
                    <button class="btn-primary" id="sellUsernameBtn">
                        <i class="fas fa-rocket"></i> Jual Username
                    </button>
                </div>
            </div>
        </div>

        <!-- Tab Content: Wallet -->
        <div class="tab-content" id="walletTab">

            <!-- Wallet Main Card - Border besar dengan logo, address, balance, tombol -->
            <div class="wallet-main-card" id="walletMainCard" style="display: none;">
                <div class="wallet-card">
                    <!-- Header dengan balance dan TON Connect sejajar -->
                    <div class="wallet-card-header-horizontal">
                        <!-- Balance Section (kiri) -->
                        <div class="wallet-balance-section">
                            <div class="wallet-balance-large" id="walletBalanceLarge">
                                <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="balance-logo-large">
                                <span class="balance-amount-large" id="walletBalanceAmount">0.00</span>
                                <span class="balance-symbol">TON</span>
                            </div>
                            <div class="wallet-address-display" id="walletAddressDisplay">
                                <span class="address-value" id="walletAddressValue">Not connected</span>
                            </div>
                        </div>
                        <!-- TON Connect Container dan Tombol Deposit/Withdraw (kanan) -->
                        <div class="wallet-right-section">
                            <div id="ton-connect-container" class="ton-connect-right"></div>
                            <div class="wallet-card-actions">
                                <button class="wallet-action-btn deposit-action" id="walletDepositBtn">
                                    <i class="fas fa-arrow-down"></i>
                                    <span>Deposit</span>
                                </button>
                                <button class="wallet-action-btn withdraw-action" id="walletWithdrawBtn">
                                    <i class="fas fa-arrow-up"></i>
                                    <span>Withdraw</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Deposit Panel (slide from bottom) -->
            <div class="wallet-panel" id="depositPanel" style="display: none;">
                <div class="panel-drag-handle"></div>
                <div class="panel-header">
                    <h3><i class="fas fa-arrow-down"></i> Deposit TON</h3>
                    <button class="panel-close" id="closeDepositPanelBtn">&times;</button>
                </div>
                <div class="panel-content">
                    <div class="amount-input-wrapper">
                        <div class="amount-input-container">
                            <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="input-logo">
                            <input type="number" id="depositAmountInput" placeholder="0.00" class="amount-input" step="0.1" min="0.1">
                        </div>
                        <div class="quick-amount-buttons">
                            <button class="quick-amount-btn" data-percent="25">25%</button>
                            <button class="quick-amount-btn" data-percent="50">50%</button>
                            <button class="quick-amount-btn" data-percent="75">75%</button>
                            <button class="quick-amount-btn" data-percent="100">Max</button>
                        </div>
                    </div>
                    <button class="panel-action-btn" id="confirmDepositBtn">
                        <i class="fas fa-check"></i> Konfirmasi Deposit
                    </button>
                </div>
            </div>

            <!-- Withdraw Panel (slide from bottom) -->
            <div class="wallet-panel" id="withdrawPanel" style="display: none;">
                <div class="panel-drag-handle"></div>
                <div class="panel-header">
                    <h3><i class="fas fa-arrow-up"></i> Withdraw TON</h3>
                    <button class="panel-close" id="closeWithdrawPanelBtn">&times;</button>
                </div>
                <div class="panel-content">
                    <div class="amount-input-wrapper">
                        <div class="amount-input-container">
                            <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="input-logo">
                            <input type="number" id="withdrawAmountInput" placeholder="0.00" class="amount-input" step="0.1" min="1">
                        </div>
                        <div class="quick-amount-buttons">
                            <button class="quick-amount-btn" data-percent="25">25%</button>
                            <button class="quick-amount-btn" data-percent="50">50%</button>
                            <button class="quick-amount-btn" data-percent="75">75%</button>
                            <button class="quick-amount-btn" data-percent="100">Max</button>
                        </div>
                        <div class="info-text-small">
                            <i class="fas fa-info-circle"></i> Minimal withdraw: 1 TON (Fee 0.02 TON)
                        </div>
                    </div>
                    <button class="panel-action-btn" id="confirmWithdrawBtn">
                        <i class="fas fa-check"></i> Konfirmasi Withdraw
                    </button>
                </div>
            </div>

            <!-- Overlay untuk panel -->
            <div id="walletPanelOverlay" class="panel-overlay" style="display: none;"></div>

            <!-- History Section -->
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-history"></i>
                    <h3>Riwayat Transaksi</h3>
                </div>
                <div class="history-list" id="historyList">
                    <div class="loading-placeholder">Memuat riwayat...</div>
                </div>
            </div>
        </div>

        <!-- Bottom Floating Tabs Navigation -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="marketplace">
                <i class="fas fa-store"></i>
                <span>Market</span>
            </button>
            <button class="tab-btn" data-tab="storage" id="storageTabBtn">
                <i class="fas fa-database"></i>
                <span>Storage</span>
            </button>
            <button class="tab-btn" data-tab="wallet">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </button>
            <button class="tab-btn" data-tab="history">
                <i class="fas fa-history"></i>
                <span>History</span>
            </button>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="/winedash/js/web.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Winedash - Marketplace Username Telegram</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/winedash/css/web.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TON Connect UI SDK (WAJIB) -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="winedash-container">
                
        <!-- Profile Header - Hanya avatar tanpa teks -->
        <div class="profile-header">
            <div class="profile-avatar" id="userAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-balance" id="balanceCard">
                <!-- Konten akan diisi JS -->
            </div>
        </div>

        <!-- Search Bar dengan tombol Apply -->
        <div class="search-container">
            <input type="text" class="search-input" id="searchUsername" placeholder="🔍 Cari username...">
            <button class="search-apply-btn" id="searchApplyBtn">Apply</button>
        </div>

        <!-- Tab Content: Marketplace -->
        <div class="tab-content active" id="marketplaceTab">
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchUsername" placeholder="🔍 Cari username...">
            </div>
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-fire"></i>
                    <h3>Username Populer</h3>
                </div>
                <div class="username-list" id="usernameList">
                    <div class="loading-placeholder">Memuat username...</div>
                </div>
            </div>
        </div>

        <!-- Tab Content: My Usernames -->
        <div class="tab-content" id="myUsernamesTab">
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-tag"></i>
                    <h3>Username Saya</h3>
                </div>
                <div class="purchased-list" id="purchasedList">
                    <div class="loading-placeholder">Memuat...</div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-plus-circle"></i>
                    <h3>Jual Username</h3>
                </div>
                <div class="sell-form">
                    <input type="text" id="sellUsername" placeholder="Username (contoh: @username)" class="form-input">
                    <input type="number" id="sellPrice" placeholder="Harga (TON)" class="form-input" step="0.1" min="0.1">
                    <select id="sellCategory" class="form-input">
                        <option value="default">Default</option>
                        <option value="premium">Premium</option>
                        <option value="vip">VIP</option>
                        <option value="rare">Langka</option>
                    </select>
                    <button class="btn-primary" id="sellUsernameBtn">
                        <i class="fas fa-rocket"></i> Jual Username
                    </button>
                </div>
            </div>
        </div>

        <!-- Tab Content: Wallet -->
        <div class="tab-content" id="walletTab">
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-wallet"></i>
                    <h3>TON Wallet</h3>
                </div>
                <div class="wallet-info">
                    <div class="wallet-status" id="walletStatus">
                        <i class="fas fa-plug"></i>
                        <span>Belum terhubung</span>
                    </div>
                    <div id="ton-connect"></div>
                    <div class="wallet-address" id="walletAddress" style="display: none;">
                        <i class="fas fa-qrcode"></i>
                        <span id="walletAddressText"></span>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-arrow-up"></i>
                    <h3>Deposit TON</h3>
                </div>
                <div class="deposit-form">
                    <input type="number" id="depositAmount" placeholder="Jumlah TON" class="form-input" step="0.1" min="0.1">
                    <button class="btn-primary" id="depositBtn">
                        <i class="fas fa-arrow-down"></i> Deposit
                    </button>
                </div>
            </div>

            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-arrow-down"></i>
                    <h3>Withdraw TON</h3>
                </div>
                <div class="withdraw-form">
                    <input type="number" id="withdrawAmount" placeholder="Jumlah TON" class="form-input" step="0.1" min="1">
                    <button class="btn-primary" id="withdrawBtn">
                        <i class="fas fa-arrow-up"></i> Withdraw
                    </button>
                </div>
                <div class="info-text">
                    <i class="fas fa-info-circle"></i> Minimal withdraw: 1 TON
                </div>
            </div>
        </div>

        <!-- Tab Content: History -->
        <div class="tab-content" id="historyTab">
            <div class="section-card">
                <div class="card-header">
                    <i class="fas fa-history"></i>
                    <h3>Riwayat Transaksi</h3>
                </div>
                <div class="history-list" id="historyList">
                    <div class="loading-placeholder">Memuat riwayat...</div>
                </div>
            </div>
        </div>

        <!-- Bottom Floating Tabs Navigation -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="marketplace">
                <i class="fas fa-store"></i>
                <span>Market</span>
            </button>
            <button class="tab-btn" data-tab="my-usernames">
                <i class="fas fa-tag"></i>
                <span>My Tags</span>
            </button>
            <button class="tab-btn" data-tab="wallet">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </button>
            <button class="tab-btn" data-tab="history">
                <i class="fas fa-history"></i>
                <span>History</span>
            </button>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="/winedash/js/web.js"></script>
</body>
</html>

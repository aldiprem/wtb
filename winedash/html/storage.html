<!-- winedash/html/storage.html - VERSI PERBAIKAN -->

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Winedash - Storage</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/winedash/css/web.css">
    <link rel="stylesheet" href="/winedash/css/storage.css">
    <link rel="stylesheet" href="/winedash/css/auctions-activity.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TON Connect UI SDK -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="storage-container">

        <!-- Profile Header -->
        <div class="storage-profile-header">
            <div class="storage-profile-avatar" id="storageUserAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="storage-balance" id="storageBalanceCard">
                <!-- Konten akan diisi JS -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="storage-bottom-nav">
            <div class="nav-circle market-icon" id="backToHomeBtn">
                <i class="fas fa-store"></i>
            </div>
            <div class="nav-links-container">
                <button class="nav-link active" data-nav="store">
                    <i class="fas fa-database"></i>
                    <span>Store</span>
                </button>
                <button class="nav-link" data-nav="offers">
                    <i class="fas fa-tag"></i>
                    <span>Offers</span>
                </button>
                <button class="nav-link" data-nav="activity">
                    <i class="fas fa-history"></i>
                    <span>Activity</span>
                </button>
            </div>
        </div>

        <!-- Mode Toggle: Fix Price / Auctions -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="fixprice">Fix Price</button>
            <button class="mode-btn" data-mode="auctions">Auctions</button>
        </div>

        <!-- ==================== FIX PRICE SECTION ==================== -->
        <div id="fixPriceSection">
            <!-- Action Row untuk Fix Price - Sekarang dengan Inbox di sini -->
            <div class="action-row">
                <button class="action-btn add-action-btn" id="addUsernameActionBtn">
                    <i class="fas fa-plus"></i>
                    <span>Add</span>
                </button>
                <button class="action-btn" id="sendUsernameBtn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send</span>
                </button>
                <button class="action-btn" id="withdrawUsernameBtn">
                    <i class="fas fa-arrow-up"></i>
                    <span>Withdraw</span>
                </button>
                <!-- INBOX PINDAH KE SINI (disamping tombol Withdraw) -->
                <div class="inbox-wrapper">
                    <button class="action-btn" id="inboxBtn">
                        <i class="fas fa-inbox"></i>
                        <span>Inbox</span>
                        <span class="inbox-badge" id="inboxBadge" style="display: none;">0</span>
                    </button>
                </div>
            </div>

            <!-- Search Bar Fix Price dengan Layout Toggle di samping Apply -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchStorage" placeholder="🔍 Cari username...">
                <div style="display: flex; gap: 8px;">
                    <button class="search-apply-btn" id="searchApplyBtn">Apply</button>
                    <!-- Layout Toggle PINDAH KE SINI (disamping tombol Apply) -->
                    <div class="layout-toggle">
                        <button class="layout-btn active" data-layout="grid" id="gridLayoutBtn">
                            <i class="fas fa-th"></i>
                        </button>
                        <button class="layout-btn" data-layout="list" id="listLayoutBtn">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Action Bar - Sekarang tanpa Inbox dan tanpa Layout Toggle -->
            <div class="action-bar">
                <button class="action-btn" id="toggleStatusBtn">
                    <i class="fas fa-eye"></i>
                    <span>All</span>
                </button>
                <button class="action-btn" id="sortBtn">
                    <i class="fas fa-sort-amount-down-alt"></i>
                </button>
            </div>

            <!-- Sort Dropdown -->
            <div id="sortDropdown" style="display: none; margin-bottom: 12px;">
                <select id="sortSelect" class="form-input" style="margin-bottom: 0;">
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="date_desc">Latest</option>
                    <option value="name_asc">Name: A to Z</option>
                    <option value="name_desc">Name: Z to A</option>
                </select>
            </div>

            <!-- Username Container Fix Price -->
            <div id="usernameContainer" style="width: 100%; min-height: 400px;">
                <div class="loading-placeholder">Memuat username...</div>
            </div>
        </div>

        <!-- ==================== AUCTIONS SECTION ==================== -->
        <div id="auctionsSection" style="display: none;">
            <!-- Action Row untuk Auctions -->
            <div class="action-row">
                <button class="action-btn add-action-btn" id="createAuctionBtn">
                    <i class="fas fa-plus-circle"></i>
                    <span>Create Auction</span>
                </button>
                <button class="action-btn" id="auctionsFilterBtn">
                    <i class="fas fa-filter"></i>
                    <span>Filter</span>
                </button>
                <button class="action-btn" id="auctionsActivityBtn">
                    <i class="fas fa-history"></i>
                    <span>Activity</span>
                </button>
                <div class="layout-toggle">
                    <button class="layout-btn active" data-layout="grid" id="auctionsGridBtn">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="layout-btn" data-layout="list" id="auctionsListBtn">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>

            <!-- Search Bar untuk Auctions -->
            <div class="search-container">
                <input type="text" class="search-input" id="auctionsSearchInput" placeholder="🔍 Cari username...">
                <button class="search-apply-btn" id="auctionsSearchApplyBtn">Apply</button>
            </div>

            <!-- Auctions Container -->
            <div id="auctionsContainer" style="width: 100%; min-height: 400px;">
                <div class="loading-placeholder">Memuat auctions...</div>
            </div>
        </div>

        <!-- Auctions Filter Dropdown Panel -->
        <div id="auctionsFilterDropdown" class="status-dropdown" style="display: none; position: fixed; z-index: 1700;">
            <div class="status-dropdown-item active" data-auctions-filter="all">
                <i class="fas fa-list"></i> All
            </div>
            <div class="status-dropdown-item" data-auctions-filter="active">
                <i class="fas fa-fire"></i> Active
            </div>
            <div class="status-dropdown-item" data-auctions-filter="ended">
                <i class="fas fa-check-circle"></i> Ended
            </div>
            <div class="status-dropdown-item" data-auctions-filter="my-bids">
                <i class="fas fa-gavel"></i> My Bids
            </div>
        </div>

        <div id="auctionsActivityFullscreen" class="fullscreen-page" style="display: none;">
            <div class="fullscreen-header">
                <div class="fullscreen-header-left">
                    <button class="back-btn-fullscreen" id="backFromActivityBtn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2><i class="fas fa-history"></i> Auction Activity</h2>
                </div>
                <button class="close-fullscreen-btn" id="closeActivityFullscreenBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="fullscreen-content">
                <!-- Tabs Navigation -->
                <div class="activity-tabs-fullscreen">
                    <button class="activity-tab-fullscreen active" data-activity-tab="my-auctions">
                        <i class="fas fa-gavel"></i>
                        <span>My Auctions</span>
                    </button>
                    <button class="activity-tab-fullscreen" data-activity-tab="my-bids">
                        <i class="fas fa-history"></i>
                        <span>My Bids</span>
                    </button>
                    <button class="activity-tab-fullscreen" data-activity-tab="ended">
                        <i class="fas fa-check-circle"></i>
                        <span>Ended</span>
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="activity-search-fullscreen">
                    <div class="search-container-fullscreen">
                        <input type="text" class="search-input-fullscreen" id="activityFullscreenSearchInput" placeholder="🔍 Cari username...">
                        <button class="search-btn-fullscreen" id="activityFullscreenSearchBtn">Apply</button>
                    </div>
                </div>

                <!-- Activity Container -->
                <div id="auctionsActivityFullscreenContainer" class="activity-fullscreen-container">
                    <div class="loading-placeholder">Memuat aktivitas...</div>
                </div>
            </div>
        </div>

        <!-- ==================== MODALS (Tetap di bawah) ==================== -->
        
        <!-- Panel Inbox (slide from bottom) -->
        <div class="inbox-panel" id="inboxPanel" style="display: none;">
            <div class="inbox-header">
                <h3><i class="fas fa-inbox"></i> Verifikasi Pending</h3>
                <button class="inbox-close" id="closeInboxBtn">&times;</button>
            </div>
            <div class="inbox-content" id="inboxContent">
                <div class="loading-placeholder">Memuat...</div>
            </div>
        </div>

        <!-- OTP Verification Modal -->
        <div id="otpModal" class="modal-overlay">
            <div class="modal-content" style="max-width: 300px;">
                <h3>Verifikasi OTP</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 16px;">
                    Masukkan kode OTP yang dikirim ke username Anda
                </p>
                <input type="text" id="otpInput" placeholder="Kode 6 digit" class="form-input" maxlength="6" style="text-align: center; letter-spacing: 4px;">
                <div class="modal-buttons">
                    <button class="modal-cancel" id="cancelOtpBtn">Batal</button>
                    <button class="modal-confirm" id="confirmOtpBtn">Verifikasi</button>
                </div>
            </div>
        </div>

        <!-- Modal Add Username -->
        <div id="addModal" class="modal-overlay">
            <div class="modal-content">
                <h3>Tambah Username</h3>
                <input type="text" id="modalUsername" placeholder="Username (tanpa @)" class="form-input">
                <input type="text" id="modalBasedOn" placeholder="Based On (nama asli)" class="form-input">
                <div id="basedOnError" class="error-message" style="display: none; color: #ef4444; font-size: 11px; margin-top: -8px; margin-bottom: 12px;"></div>
                <input type="number" id="modalPrice" placeholder="Harga (TON)" class="form-input" step="0.1" min="0.1">
                <div class="modal-buttons">
                    <button class="modal-cancel" id="cancelModalBtn">Batal</button>
                    <button class="modal-confirm" id="confirmAddBtn">Tambah</button>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="/winedash/js/storage.js"></script>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            const tab = urlParams.get('tab');
            const auctionId = urlParams.get('auction');
            
            if (mode === 'auctions') {
                // Switch ke mode auctions
                const auctionsBtn = document.querySelector('.mode-btn[data-mode="auctions"]');
                if (auctionsBtn) {
                    setTimeout(() => {
                        auctionsBtn.click();
                        
                        if (tab === 'active') {
                            const activeTabBtn = document.querySelector('.auctions-action-btn[data-auctions-tab="active"]');
                            if (activeTabBtn) {
                                setTimeout(() => activeTabBtn.click(), 500);
                            }
                        }
                        
                        if (auctionId) {
                            setTimeout(() => {
                                const auctionCard = document.querySelector(`.auction-card[data-auction*='"id":${auctionId}']`);
                                if (auctionCard) {
                                    auctionCard.click();
                                }
                            }, 1000);
                        }
                    }, 500);
                }
            }
        })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Full Source Code Data - Winedash</title>
    <link rel="stylesheet" href="/css/source-code.css">
</head>
<body>
    <div class="container">
        <h1>WINEDASH FULL SYSTEM SOURCE CODE</h1>
        <p>Halaman ini berisi seluruh baris kode untuk dianalisis oleh AI. Format: Nama File diikuti isinya.</p>
        <hr>

        {% for file in files %}
        <div class="file-block">
            <h2 class="file-title">START_FILE: {{ file.path }}</h2>
            <pre class="code-content">{{ file.content | e }}</pre>
            <h2 class="file-footer">END_FILE: {{ file.path }}</h2>
            <hr class="separator">
        </div>
        {% endfor %}
    </div>
</body>
</html>

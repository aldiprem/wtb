<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Background TGS Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Container */
        .tgs-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #0a0a0a;
        }

        /* TGS Item Container */
        .tgs-item {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Floating Animation Variants */
        .tgs-item.float-slow {
            animation: fadeIn 0.5s ease forwards, floatSlow 20s ease-in-out infinite;
        }
        
        .tgs-item.float-medium {
            animation: fadeIn 0.5s ease forwards, floatMedium 15s ease-in-out infinite;
        }
        
        .tgs-item.float-fast {
            animation: fadeIn 0.5s ease forwards, floatFast 10s ease-in-out infinite;
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes floatMedium {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-3deg); }
        }

        @keyframes floatFast {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(8deg); }
        }

        /* Pulse Animation */
        .tgs-item.pulse {
            animation: fadeIn 0.5s ease forwards, pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Spin Animation */
        .tgs-item.spin {
            animation: fadeIn 0.5s ease forwards, spin 12s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Drift Animation */
        .tgs-item.drift {
            animation: fadeIn 0.5s ease forwards, drift 25s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translateX(0px) translateY(0px); }
            25% { transform: translateX(15px) translateY(-10px); }
            50% { transform: translateX(-10px) translateY(-20px); }
            75% { transform: translateX(-15px) translateY(-5px); }
        }

        /* Wobble Animation */
        .tgs-item.wobble {
            animation: fadeIn 0.5s ease forwards, wobble 8s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            75% { transform: rotate(-6deg); }
        }

        /* Bounce Animation */
        .tgs-item.bounce {
            animation: fadeIn 0.5s ease forwards, bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Content Overlay - biar konten di atas background */
        .content-overlay {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            backdrop-filter: blur(2px);
        }

        /* Card Style untuk demo */
        .demo-card {
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .demo-card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #40a7e3, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .demo-card p {
            color: var(--text-secondary, #a0a0a0);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .info-text {
            background: rgba(64, 167, 227, 0.15);
            border-radius: 16px;
            padding: 16px;
            font-size: 12px;
            color: var(--text-secondary, #a0a0a0);
            border: 1px solid rgba(64, 167, 227, 0.3);
        }

        .info-text i {
            color: #40a7e3;
            margin-right: 8px;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(64, 167, 227, 0.2);
            border-top-color: #40a7e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: var(--text-secondary, #a0a0a0);
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Canvas untuk TGS */
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
    </style>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <!-- Background Container -->
    <div id="tgsBackground" class="tgs-background"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading background animations...</div>
    </div>
    
    <!-- Content Overlay (Demo konten di atas background) -->
    <div class="content-overlay">
        <div class="demo-card">
            <h1>✨ Background TGS Animation</h1>
            <p>Background ini dihasilkan dari file <strong>.tgs</strong> yang diambil dari folder <code>image/bg/</code></p>
            <div class="info-text">
                <i class="fas fa-info-circle"></i> Animasi berjalan acak dengan berbagai efek floating, pulse, spin, drift, wobble, dan bounce.
                <br><br>
                <i class="fas fa-layer-group"></i> Total file TGS: <span id="totalTgsCount">0</span> | Active: <span id="activeTgsCount">0</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const BG_PATH = '/image/bg/';
            let tgsFiles = [];
            let animations = [];
            let container = document.getElementById('tgsBackground');
            let isLoading = true;
            
            // Konfigurasi ukuran dan posisi
            const CONFIG = {
                minSize: 40,
                maxSize: 120,
                minTop: 5,
                maxTop: 85,
                minLeft: 5,
                maxLeft: 85,
                zIndexMin: 1,
                zIndexMax: 5,
                animationTypes: ['float-slow', 'float-medium', 'float-fast', 'pulse', 'spin', 'drift', 'wobble', 'bounce']
            };
            
            // ==================== UTILITY FUNCTIONS ====================
            
            function random(min, max) {
                return Math.random() * (max - min) + min;
            }
            
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
            
            function getRandomAnimationClass() {
                return CONFIG.animationTypes[Math.floor(Math.random() * CONFIG.animationTypes.length)];
            }
            
            // ==================== CEK KETUMPANGAN POSISI ====================
            
            function isOverlapping(newX, newY, newWidth, newHeight, existingItems, padding = 30) {
                for (const item of existingItems) {
                    const rect1 = {
                        x: newX - padding,
                        y: newY - padding,
                        w: newWidth + padding * 2,
                        h: newHeight + padding * 2
                    };
                    const rect2 = {
                        x: item.x - padding,
                        y: item.y - padding,
                        w: item.w + padding * 2,
                        h: item.h + padding * 2
                    };
                    
                    if (rect1.x < rect2.x + rect2.w &&
                        rect1.x + rect1.w > rect2.x &&
                        rect1.y < rect2.y + rect2.h &&
                        rect1.y + rect1.h > rect2.y) {
                        return true;
                    }
                }
                return false;
            }
            
            // ==================== GENERATE POSISI UNIK ====================
            
            function generateUniquePosition(width, height, existingItems, maxAttempts = 50) {
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const x = random(CONFIG.minLeft, CONFIG.maxLeft);
                    const y = random(CONFIG.minTop, CONFIG.maxTop);
                    const w = width;
                    const h = height;
                    
                    // Konversi ke pixel relatif terhadap viewport
                    const pixelX = (x / 100) * window.innerWidth;
                    const pixelY = (y / 100) * window.innerHeight;
                    
                    if (!isOverlapping(pixelX, pixelY, w, h, existingItems)) {
                        return { x: x, y: y };
                    }
                }
                
                // Jika gagal setelah banyak attempts, return posisi random saja
                return {
                    x: random(CONFIG.minLeft, CONFIG.maxLeft),
                    y: random(CONFIG.minTop, CONFIG.maxTop)
                };
            }
            
            // ==================== LOAD TGS FILES ====================
            
            async function fetchTgsFiles() {
                try {
                    console.log('[BG] Fetching TGS files from:', BG_PATH);
                    
                    // Karena kita tidak bisa listing directory langsung, 
                    // kita perlu API endpoint untuk mendapatkan daftar file
                    const response = await fetch('/api/bg-files');
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.files) {
                            tgsFiles = data.files;
                            console.log(`[BG] Found ${tgsFiles.length} TGS files via API`);
                            return;
                        }
                    }
                    
                    // Fallback: list file yang diketahui
                    // Atau bisa juga menggunakan manifest file
                    console.warn('[BG] API not available, using fallback');
                    tgsFiles = await getFallbackTgsFiles();
                    
                } catch (error) {
                    console.error('[BG] Error fetching TGS files:', error);
                    tgsFiles = await getFallbackTgsFiles();
                }
            }
            
            async function getFallbackTgsFiles() {
                // Fallback: coba beberapa file yang umum
                const commonFiles = [
                    'star.tgs', 'circle.tgs', 'wave.tgs', 'particle.tgs',
                    'sparkle.tgs', 'glow.tgs', 'floating.tgs', 'bubble.tgs'
                ];
                
                // Coba cek satu per satu
                const existingFiles = [];
                for (const file of commonFiles) {
                    try {
                        const testResponse = await fetch(`${BG_PATH}${file}`, { method: 'HEAD' });
                        if (testResponse.ok) {
                            existingFiles.push(file);
                        }
                    } catch (e) {
                        // Skip
                    }
                }
                
                if (existingFiles.length === 0) {
                    // Jika tidak ada, gunakan file default yang sudah dipastikan ada
                    return ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                }
                
                return existingFiles;
            }
            
            // ==================== LOAD DAN RENDER TGS ====================
            
            async function loadTGSAnimation(fileName, index, totalFiles, existingItems) {
                return new Promise((resolve, reject) => {
                    const url = `${BG_PATH}${fileName}`;
                    
                    fetch(url)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.arrayBuffer();
                        })
                        .then(arrayBuffer => {
                            const compressed = new Uint8Array(arrayBuffer);
                            let animationData;
                            
                            try {
                                // Coba decompress dengan pako
                                const decompressed = window.pako.ungzip(compressed, { to: 'string' });
                                animationData = JSON.parse(decompressed);
                            } catch (e) {
                                // Mungkin sudah JSON biasa
                                const text = new TextDecoder().decode(compressed);
                                animationData = JSON.parse(text);
                            }
                            
                            // Ukuran acak
                            const size = randomInt(CONFIG.minSize, CONFIG.maxSize);
                            const animationClass = getRandomAnimationClass();
                            const zIndex = randomInt(CONFIG.zIndexMin, CONFIG.zIndexMax);
                            
                            // Generate posisi unik
                            const position = generateUniquePosition(size, size, existingItems);
                            
                            // Buat container div untuk animasi
                            const itemDiv = document.createElement('div');
                            itemDiv.className = `tgs-item ${animationClass}`;
                            itemDiv.style.position = 'absolute';
                            itemDiv.style.left = `${position.x}%`;
                            itemDiv.style.top = `${position.y}%`;
                            itemDiv.style.width = `${size}px`;
                            itemDiv.style.height = `${size}px`;
                            itemDiv.style.zIndex = zIndex;
                            itemDiv.style.transform = 'translate(-50%, -50%)';
                            itemDiv.style.cursor = 'pointer';
                            
                            // Simpan data posisi untuk pengecekan overlap
                            existingItems.push({
                                x: (position.x / 100) * window.innerWidth,
                                y: (position.y / 100) * window.innerHeight,
                                w: size,
                                h: size,
                                element: itemDiv
                            });
                            
                            container.appendChild(itemDiv);
                            
                            // Render animation dengan lottie
                            const anim = window.lottie.loadAnimation({
                                container: itemDiv,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true,
                                animationData: animationData,
                                rendererSettings: {
                                    preserveAspectRatio: 'xMidYMid meet'
                                }
                            });
                            
                            animations.push({
                                id: fileName,
                                animation: anim,
                                element: itemDiv,
                                size: size,
                                position: position
                            });
                            
                            // Update progress
                            const progress = ((index + 1) / totalFiles) * 100;
                            if (document.querySelector('.loading-text')) {
                                document.querySelector('.loading-text').textContent = 
                                    `Loading background animations... ${Math.round(progress)}%`;
                            }
                            
                            resolve();
                        })
                        .catch(error => {
                            console.error(`[BG] Failed to load ${fileName}:`, error);
                            resolve(); // Resolve anyway to continue
                        });
                });
            }
            
            // ==================== RENDER SEMUA TGS ====================
            
            async function renderAllTGS() {
                if (!tgsFiles.length) {
                    console.warn('[BG] No TGS files to render');
                    hideLoading();
                    return;
                }
                
                console.log(`[BG] Rendering ${tgsFiles.length} TGS files`);
                
                const existingItems = [];
                const totalFiles = tgsFiles.length;
                
                // Load semua file secara berurutan dengan delay kecil
                for (let i = 0; i < totalFiles; i++) {
                    await loadTGSAnimation(tgsFiles[i], i, totalFiles, existingItems);
                    // Delay kecil agar tidak overload
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                console.log(`[BG] Successfully rendered ${animations.length} animations`);
                updateStats();
                hideLoading();
                
                // Tambahkan event listener untuk resize window
                window.addEventListener('resize', () => {
                    repositionOnResize(existingItems);
                });
            }
            
            // ==================== REPOSITION ON RESIZE ====================
            
            function repositionOnResize(existingItems) {
                // Update posisi berdasarkan persentase yang tersimpan
                for (let i = 0; i < animations.length; i++) {
                    const anim = animations[i];
                    if (anim.element && anim.position) {
                        anim.element.style.left = `${anim.position.x}%`;
                        anim.element.style.top = `${anim.position.y}%`;
                        
                        // Update existingItems posisi pixel
                        if (existingItems[i]) {
                            existingItems[i].x = (anim.position.x / 100) * window.innerWidth;
                            existingItems[i].y = (anim.position.y / 100) * window.innerHeight;
                        }
                    }
                }
            }
            
            // ==================== HIDE LOADING ====================
            
            function hideLoading() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
                isLoading = false;
            }
            
            // ==================== UPDATE STATS ====================
            
            function updateStats() {
                const totalSpan = document.getElementById('totalTgsCount');
                const activeSpan = document.getElementById('activeTgsCount');
                if (totalSpan) totalSpan.textContent = tgsFiles.length;
                if (activeSpan) activeSpan.textContent = animations.length;
            }
            
            // ==================== API ENDPOINT FOR FILE LISTING ====================
            
            // Tambahkan endpoint ini ke app.py jika belum ada
            async function ensureApiEndpoint() {
                // Cek apakah endpoint /api/bg-files sudah ada
                try {
                    const testResponse = await fetch('/api/bg-files');
                    if (testResponse.ok) return;
                } catch (e) {
                    // Endpoint tidak ada, kita akan menggunakan fallback
                    console.log('[BG] API endpoint not available, using fallback');
                }
            }
            
            // ==================== INITIALIZATION ====================
            
            async function init() {
                console.log('[BG] Initializing background TGS animations...');
                
                // Pastikan container ada
                if (!container) {
                    container = document.getElementById('tgsBackground');
                    if (!container) {
                        console.error('[BG] Container not found');
                        return;
                    }
                }
                
                await ensureApiEndpoint();
                await fetchTgsFiles();
                await renderAllTGS();
                
                console.log('[BG] Background TGS animations ready');
            }
            
            // Start initialization
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // Export untuk debugging
            window.bgTGS = {
                reload: renderAllTGS,
                animations: () => animations,
                files: () => tgsFiles
            };
        })();
    </script>
</body>
</html>

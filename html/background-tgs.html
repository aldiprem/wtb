<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Background TGS Pattern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Container */
        .tgs-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #0a0a0a;
        }

        /* TGS Item Container - Tanpa animasi gerakan */
        .tgs-item {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
            /* Pastikan tidak terbalik */
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Canvas untuk TGS */
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            /* Pastikan tidak terbalik */
            transform: scale(1) rotate(0deg);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(64, 167, 227, 0.2);
            border-top-color: #40a7e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #a0a0a0;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hapus semua efek animasi gerakan */
        .tgs-item.no-animation {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <!-- Background Container -->
    <div id="tgsBackground" class="tgs-background"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading background patterns...</div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const BG_PATH = '/image/bg/';
            let tgsFiles = [];
            let animations = [];
            let container = document.getElementById('tgsBackground');
            
            // Konfigurasi - JARAK SANGAT DEKAT
            const CONFIG = {
                minSize: 35,        // Ukuran minimal (px)
                maxSize: 80,        // Ukuran maksimal (px)
                spacingX: 15,       // Jarak horizontal antar item (px) - SANGAT DEKAT
                spacingY: 15,       // Jarak vertikal antar item (px) - SANGAT DEKAT
                marginX: 10,        // Margin kiri-kanan (%)
                marginY: 8,         // Margin atas-bawah (%)
                maxItemsPerFile: 5  // Setiap file TGS akan ditampilkan 5 kali
            };
            
            // ==================== UTILITY FUNCTIONS ====================
            
            function random(min, max) {
                return Math.random() * (max - min) + min;
            }
            
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
            
            // ==================== GENERATE POSISI GRID DENGAN JARAK DEKAT ====================
            
            function generateGridPositions(itemCount, itemSize) {
                const positions = [];
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                
                // Hitung margin dalam pixel
                const marginXPx = (CONFIG.marginX / 100) * viewportWidth;
                const marginYPx = (CONFIG.marginY / 100) * viewportHeight;
                
                // Area yang tersedia untuk grid
                const availableWidth = viewportWidth - (marginXPx * 2);
                const availableHeight = viewportHeight - (marginYPx * 2);
                
                // Hitung berapa banyak kolom dan baris yang bisa muat dengan jarak sangat dekat
                const cols = Math.floor(availableWidth / (itemSize + CONFIG.spacingX));
                const rows = Math.floor(availableHeight / (itemSize + CONFIG.spacingY));
                
                // Total slot yang tersedia
                const totalSlots = cols * rows;
                
                // Jika slot kurang dari item yang dibutuhkan, tambah kolom/baris
                let finalCols = cols;
                let finalRows = rows;
                
                if (totalSlots < itemCount) {
                    // Hitung ulang dengan jarak yang lebih kecil
                    const neededCols = Math.ceil(Math.sqrt(itemCount));
                    const neededRows = Math.ceil(itemCount / neededCols);
                    finalCols = neededCols;
                    finalRows = neededRows;
                }
                
                // Hitung ulang spacing agar pas
                const actualSpacingX = (availableWidth - (finalCols * itemSize)) / (finalCols - 1);
                const actualSpacingY = (availableHeight - (finalRows * itemSize)) / (finalRows - 1);
                
                const spacingX = Math.max(actualSpacingX, CONFIG.spacingX);
                const spacingY = Math.max(actualSpacingY, CONFIG.spacingY);
                
                // Mulai posisi dari margin
                let startX = marginXPx + itemSize / 2;
                let startY = marginYPx + itemSize / 2;
                
                // Generate posisi grid
                let index = 0;
                for (let row = 0; row < finalRows && index < itemCount; row++) {
                    for (let col = 0; col < finalCols && index < itemCount; col++) {
                        const x = startX + (col * (itemSize + spacingX));
                        const y = startY + (row * (itemSize + spacingY));
                        
                        // Pastikan tidak keluar batas
                        if (x + itemSize/2 <= viewportWidth - marginXPx &&
                            y + itemSize/2 <= viewportHeight - marginYPx) {
                            positions.push({
                                x: (x / viewportWidth) * 100,
                                y: (y / viewportHeight) * 100
                            });
                            index++;
                        }
                    }
                }
                
                // Jika masih kurang, isi dengan posisi random di area yang tersisa
                while (positions.length < itemCount) {
                    const randomX = random(CONFIG.marginX, 100 - CONFIG.marginX);
                    const randomY = random(CONFIG.marginY, 100 - CONFIG.marginY);
                    positions.push({ x: randomX, y: randomY });
                }
                
                return positions;
            }
            
            // ==================== LOAD TGS FILES VIA API ====================
            
            async function fetchTgsFiles() {
                try {
                    console.log('[BG] Fetching TGS files from:', BG_PATH);
                    
                    const response = await fetch('/api/bg-files');
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.files && data.files.length > 0) {
                            tgsFiles = data.files;
                            console.log(`[BG] Found ${tgsFiles.length} TGS files via API`);
                            return;
                        }
                    }
                    
                    // Fallback: gunakan file default
                    console.warn('[BG] API not available or no files, using fallback');
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                    
                } catch (error) {
                    console.error('[BG] Error fetching TGS files:', error);
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                }
            }
            
            // ==================== LOAD DAN RENDER TGS ====================
            
            async function loadTGSAnimation(fileName, instanceIndex, totalInstances, position, size, zIndex) {
                return new Promise((resolve) => {
                    const url = `${BG_PATH}${fileName}`;
                    
                    fetch(url)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.arrayBuffer();
                        })
                        .then(arrayBuffer => {
                            const compressed = new Uint8Array(arrayBuffer);
                            let animationData;
                            
                            try {
                                const decompressed = window.pako.ungzip(compressed, { to: 'string' });
                                animationData = JSON.parse(decompressed);
                            } catch (e) {
                                const text = new TextDecoder().decode(compressed);
                                animationData = JSON.parse(text);
                            }
                            
                            // Buat container div untuk animasi
                            const itemDiv = document.createElement('div');
                            itemDiv.className = 'tgs-item no-animation';
                            itemDiv.style.position = 'absolute';
                            itemDiv.style.left = `${position.x}%`;
                            itemDiv.style.top = `${position.y}%`;
                            itemDiv.style.width = `${size}px`;
                            itemDiv.style.height = `${size}px`;
                            itemDiv.style.zIndex = zIndex;
                            // Pastikan tidak terbalik - gunakan transform yang stabil
                            itemDiv.style.transform = 'translate(-50%, -50%) scale(1) rotate(0deg)';
                            itemDiv.style.willChange = 'auto';
                            
                            container.appendChild(itemDiv);
                            
                            // Render animation dengan lottie - tanpa loop animasi gerakan
                            const anim = window.lottie.loadAnimation({
                                container: itemDiv,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true,
                                animationData: animationData,
                                rendererSettings: {
                                    preserveAspectRatio: 'xMidYMid meet',
                                    clearCanvas: true,
                                    progressiveLoad: false,
                                    hideOnTransparent: false
                                }
                            });
                            
                            // Pastikan animasi tidak memiliki gerakan translasi/rotasi
                            // (biarkan animasi internal TGS berjalan, tapi tanpa gerakan elemen)
                            
                            animations.push({
                                id: `${fileName}_${instanceIndex}`,
                                animation: anim,
                                element: itemDiv,
                                size: size,
                                position: position
                            });
                            
                            resolve();
                        })
                        .catch(error => {
                            console.error(`[BG] Failed to load ${fileName}:`, error);
                            resolve();
                        });
                });
            }
            
            // ==================== RENDER SEMUA TGS DENGAN REPLIKASI ====================
            
            async function renderAllTGS() {
                if (!tgsFiles.length) {
                    console.warn('[BG] No TGS files to render');
                    hideLoading();
                    return;
                }
                
                console.log(`[BG] Rendering ${tgsFiles.length} TGS files, each repeated ${CONFIG.maxItemsPerFile} times`);
                
                // Hitung total item yang akan dirender
                const totalItems = tgsFiles.length * CONFIG.maxItemsPerFile;
                
                // Tentukan ukuran berdasarkan jumlah item
                let itemSize;
                if (totalItems <= 20) {
                    itemSize = randomInt(45, 70);
                } else if (totalItems <= 50) {
                    itemSize = randomInt(40, 60);
                } else {
                    itemSize = randomInt(35, 50);
                }
                
                // Generate posisi grid untuk semua item
                const positions = generateGridPositions(totalItems, itemSize);
                
                console.log(`[BG] Generated ${positions.length} positions for ${totalItems} items, size: ${itemSize}px`);
                
                let currentIndex = 0;
                let loadedCount = 0;
                
                // Update loading text
                const loadingText = document.querySelector('.loading-text');
                
                // Render setiap file TGS beberapa kali
                for (const fileName of tgsFiles) {
                    for (let instance = 0; instance < CONFIG.maxItemsPerFile; instance++) {
                        if (currentIndex >= positions.length) break;
                        
                        const position = positions[currentIndex];
                        const zIndex = randomInt(1, 3);
                        
                        await loadTGSAnimation(fileName, instance, CONFIG.maxItemsPerFile, position, itemSize, zIndex);
                        
                        loadedCount++;
                        if (loadingText) {
                            loadingText.textContent = `Loading background patterns... ${Math.round((loadedCount / totalItems) * 100)}%`;
                        }
                        
                        // Delay kecil agar tidak overload
                        await new Promise(resolve => setTimeout(resolve, 30));
                        currentIndex++;
                    }
                }
                
                console.log(`[BG] Successfully rendered ${animations.length} patterns`);
                hideLoading();
                
                // Tambahkan event listener untuk resize window - reposition grid
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        repositionOnResize();
                    }, 250);
                });
            }
            
            // ==================== REPOSITION ON RESIZE ====================
            
            function repositionOnResize() {
                const totalItems = animations.length;
                if (totalItems === 0) return;
                
                // Tentukan ukuran (ambil dari elemen pertama)
                const itemSize = animations[0]?.size || 50;
                
                // Generate ulang posisi
                const newPositions = generateGridPositions(totalItems, itemSize);
                
                // Update posisi setiap elemen
                for (let i = 0; i < animations.length && i < newPositions.length; i++) {
                    const anim = animations[i];
                    const newPos = newPositions[i];
                    if (anim.element && newPos) {
                        anim.element.style.left = `${newPos.x}%`;
                        anim.element.style.top = `${newPos.y}%`;
                        anim.position = newPos;
                    }
                }
            }
            
            // ==================== HIDE LOADING ====================
            
            function hideLoading() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
            }
            
            // ==================== INITIALIZATION ====================
            
            async function init() {
                console.log('[BG] Initializing background TGS patterns...');
                
                if (!container) {
                    container = document.getElementById('tgsBackground');
                    if (!container) {
                        console.error('[BG] Container not found');
                        return;
                    }
                }
                
                await fetchTgsFiles();
                await renderAllTGS();
                
                console.log('[BG] Background TGS patterns ready');
            }
            
            // Start initialization
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // Export untuk debugging
            window.bgTGS = {
                reload: renderAllTGS,
                animations: () => animations,
                files: () => tgsFiles,
                count: () => animations.length
            };
        })();
    </script>
</body>
</html>

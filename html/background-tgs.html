<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Background TGS Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Container - FULL LAYAR */
        .tgs-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #0a0a0a;
        }

        /* TGS Item Container - Wallpaper style */
        .tgs-item {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 0.2s ease forwards;
            /* Rotasi random akan di-set via JS */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Canvas untuk TGS */
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(64, 167, 227, 0.2);
            border-top-color: #40a7e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #a0a0a0;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <!-- Background Container - FULL LAYAR -->
    <div id="tgsBackground" class="tgs-background"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading wallpaper patterns...</div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const BG_PATH = '/image/bg/';
            let tgsFiles = [];
            let animations = [];
            let container = document.getElementById('tgsBackground');
            let isRendering = false;
            
            // Konfigurasi WALLPAPER - RANDOM, TIDAK DI SUSUN
            const CONFIG = {
                minSize: 30,           // Ukuran minimal (px)
                maxSize: 100,          // Ukuran maksimal (px)
                totalItems: 40,        // Total item yang akan ditampilkan (cukup padat)
                maxItemsPerFile: 4,    // Setiap file TGS max 4 kali
                rotationRange: 45,     // Range rotasi -45 sampai +45 derajat (tidak terbalik)
                extremeRotation: 90,   // Kadang ada yang 90 derajat (tapi tidak terbalik)
                useExtremeRotation: true // Aktifkan rotasi ekstrim (90 derajat)
            };
            
            // ==================== UTILITY FUNCTIONS ====================
            
            function random(min, max) {
                return Math.random() * (max - min) + min;
            }
            
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
            
            // ==================== GENERATE ROTASI RANDOM ====================
            
            function getRandomRotation() {
                // Pilih jenis rotasi
                const rotationType = Math.random();
                
                // 60%: rotasi normal (-45 sampai +45 derajat)
                if (rotationType < 0.6) {
                    return randomInt(-CONFIG.rotationRange, CONFIG.rotationRange);
                }
                // 25%: rotasi sedang (-70 sampai +70 derajat)
                else if (rotationType < 0.85) {
                    return randomInt(-70, 70);
                }
                // 15%: rotasi ekstrim (90 derajat atau -90 derajat) - TAPI TIDAK TERBALIK
                else if (CONFIG.useExtremeRotation) {
                    // 90 atau -90 derajat, tidak pernah 180 (terbalik)
                    return Math.random() > 0.5 ? 90 : -90;
                }
                // Default
                return randomInt(-30, 30);
            }
            
            // ==================== GENERATE POSISI RANDOM FULL LAYAR ====================
            
            function generateRandomPositions(count, minDistance = 30) {
                const positions = [];
                const maxAttempts = 100;
                
                for (let i = 0; i < count; i++) {
                    let attempts = 0;
                    let placed = false;
                    
                    while (!placed && attempts < maxAttempts) {
                        // Posisi random di seluruh layar (0% - 100%)
                        const x = random(2, 98);
                        const y = random(2, 98);
                        
                        // Cek jarak minimal dengan posisi yang sudah ada (opsional, biar tidak terlalu numpuk)
                        let tooClose = false;
                        for (const existing of positions) {
                            const dx = Math.abs(existing.x - x);
                            const dy = Math.abs(existing.y - y);
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < minDistance) {
                                tooClose = true;
                                break;
                            }
                        }
                        
                        if (!tooClose) {
                            positions.push({ x: x, y: y });
                            placed = true;
                        }
                        attempts++;
                    }
                    
                    // Jika gagal setelah banyak attempts, taruh di posisi random saja
                    if (!placed) {
                        positions.push({ x: random(0, 100), y: random(0, 100) });
                    }
                }
                
                return positions;
            }
            
            // ==================== LOAD TGS FILES VIA API ====================
            
            async function fetchTgsFiles() {
                try {
                    console.log('[BG] Fetching TGS files from:', BG_PATH);
                    
                    const response = await fetch('/api/bg-files');
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.files && data.files.length > 0) {
                            tgsFiles = data.files;
                            console.log(`[BG] Found ${tgsFiles.length} TGS files via API`);
                            return;
                        }
                    }
                    
                    // Fallback: gunakan file default
                    console.warn('[BG] API not available or no files, using fallback');
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                    
                } catch (error) {
                    console.error('[BG] Error fetching TGS files:', error);
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                }
            }
            
            // ==================== LOAD SEMUA TGS FILE SECARA PARALEL ====================
            
            async function loadAllTGSFiles() {
                const allItems = [];
                
                // Hitung berapa banyak item per file
                const itemsPerFile = Math.ceil(CONFIG.totalItems / tgsFiles.length);
                const actualItemsPerFile = Math.min(itemsPerFile, CONFIG.maxItemsPerFile);
                
                console.log(`[BG] Loading ${tgsFiles.length} files, ~${actualItemsPerFile} items per file, total ~${tgsFiles.length * actualItemsPerFile} items`);
                
                // Generate posisi random untuk semua item
                const totalItems = tgsFiles.length * actualItemsPerFile;
                const positions = generateRandomPositions(totalItems, 25);
                
                let itemIndex = 0;
                const loadPromises = [];
                
                for (const fileName of tgsFiles) {
                    for (let i = 0; i < actualItemsPerFile && itemIndex < positions.length; i++) {
                        const position = positions[itemIndex];
                        const size = randomInt(CONFIG.minSize, CONFIG.maxSize);
                        const rotation = getRandomRotation();
                        const zIndex = randomInt(1, 5);
                        
                        const promise = loadSingleTGS(fileName, i, position, size, rotation, zIndex);
                        loadPromises.push(promise);
                        
                        itemIndex++;
                    }
                }
                
                // Update loading text
                const loadingText = document.querySelector('.loading-text');
                let completed = 0;
                
                // Jalankan semua promise secara paralel dengan progress
                const results = await Promise.allSettled(
                    loadPromises.map(async (promise, idx) => {
                        const result = await promise;
                        completed++;
                        if (loadingText) {
                            loadingText.textContent = `Loading wallpaper patterns... ${Math.round((completed / loadPromises.length) * 100)}%`;
                        }
                        return result;
                    })
                );
                
                console.log(`[BG] Successfully loaded ${animations.length} wallpaper items`);
                return results;
            }
            
            // ==================== LOAD SINGLE TGS ====================
            
            async function loadSingleTGS(fileName, instanceIndex, position, size, rotation, zIndex) {
                return new Promise((resolve) => {
                    const url = `${BG_PATH}${fileName}`;
                    
                    fetch(url)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.arrayBuffer();
                        })
                        .then(arrayBuffer => {
                            const compressed = new Uint8Array(arrayBuffer);
                            let animationData;
                            
                            try {
                                const decompressed = window.pako.ungzip(compressed, { to: 'string' });
                                animationData = JSON.parse(decompressed);
                            } catch (e) {
                                const text = new TextDecoder().decode(compressed);
                                animationData = JSON.parse(text);
                            }
                            
                            // Buat container div untuk animasi
                            const itemDiv = document.createElement('div');
                            itemDiv.className = 'tgs-item';
                            itemDiv.style.position = 'absolute';
                            itemDiv.style.left = `${position.x}%`;
                            itemDiv.style.top = `${position.y}%`;
                            itemDiv.style.width = `${size}px`;
                            itemDiv.style.height = `${size}px`;
                            itemDiv.style.zIndex = zIndex;
                            // Rotasi random - PASTIKAN TIDAK TERBALIK (tidak 180 derajat)
                            itemDiv.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                            itemDiv.style.willChange = 'transform';
                            
                            container.appendChild(itemDiv);
                            
                            // Render animation dengan lottie
                            const anim = window.lottie.loadAnimation({
                                container: itemDiv,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true,
                                animationData: animationData,
                                rendererSettings: {
                                    preserveAspectRatio: 'xMidYMid meet',
                                    clearCanvas: true
                                }
                            });
                            
                            animations.push({
                                id: `${fileName}_${instanceIndex}`,
                                animation: anim,
                                element: itemDiv,
                                size: size,
                                position: position,
                                rotation: rotation
                            });
                            
                            resolve(true);
                        })
                        .catch(error => {
                            console.error(`[BG] Failed to load ${fileName}:`, error);
                            resolve(false);
                        });
                });
            }
            
            // ==================== RENDER WALLPAPER ====================
            
            async function renderWallpaper() {
                if (isRendering) return;
                isRendering = true;
                
                if (!tgsFiles.length) {
                    console.warn('[BG] No TGS files to render');
                    hideLoading();
                    isRendering = false;
                    return;
                }
                
                console.log(`[BG] Rendering wallpaper with ${tgsFiles.length} TGS files`);
                
                await loadAllTGSFiles();
                
                console.log(`[BG] Wallpaper ready with ${animations.length} items`);
                hideLoading();
                isRendering = false;
                
                // Tidak perlu reposition on resize karena posisi sudah dalam persentase
                // Tapi kita tetap update ukuran jika perlu
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        // Ukuran akan tetap proporsional karena menggunakan persentase
                        console.log('[BG] Window resized, wallpaper remains proportional');
                    }, 250);
                });
            }
            
            // ==================== HIDE LOADING ====================
            
            function hideLoading() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
            }
            
            // ==================== CLEANUP ====================
            
            function cleanup() {
                for (const anim of animations) {
                    if (anim.animation) {
                        anim.animation.destroy();
                    }
                    if (anim.element && anim.element.parentNode) {
                        anim.element.parentNode.removeChild(anim.element);
                    }
                }
                animations = [];
            }
            
            // ==================== RELOAD WALLPAPER ====================
            
            async function reloadWallpaper() {
                cleanup();
                await renderWallpaper();
            }
            
            // ==================== INITIALIZATION ====================
            
            async function init() {
                console.log('[BG] Initializing wallpaper TGS patterns...');
                
                if (!container) {
                    container = document.getElementById('tgsBackground');
                    if (!container) {
                        console.error('[BG] Container not found');
                        return;
                    }
                }
                
                await fetchTgsFiles();
                await renderWallpaper();
                
                console.log('[BG] Wallpaper TGS patterns ready');
            }
            
            // Start initialization
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // Export untuk debugging
            window.bgTGS = {
                reload: reloadWallpaper,
                animations: () => animations,
                files: () => tgsFiles,
                count: () => animations.length,
                cleanup: cleanup
            };
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Background TGS Wallpaper - Padat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Container - FULL LAYAR */
        .tgs-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #0a0a0a;
        }

        /* TGS Item Container - Wallpaper style */
        .tgs-item {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 0.2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Canvas untuk TGS */
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(64, 167, 227, 0.2);
            border-top-color: #40a7e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #a0a0a0;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <!-- Background Container - FULL LAYAR -->
    <div id="tgsBackground" class="tgs-background"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading wallpaper patterns...</div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const BG_PATH = '/image/bg/';
            let tgsFiles = [];
            let animations = [];
            let container = document.getElementById('tgsBackground');
            let isRendering = false;
            
            // Konfigurasi WALLPAPER - PADAT, TIDAK SALING TIMPA
            const CONFIG = {
                baseSize: 70,           // Ukuran dasar (px) - NORMAL, TIDAK KECIL
                sizeVariation: 15,      // Variasi ukuran (±15px) - tetap normal
                minSize: 55,            // Ukuran minimal (masih normal)
                maxSize: 85,            // Ukuran maksimal
                gap: 8,                 // Jarak SANGAT TIPIS antar item (px)
                rotationRange: 60,      // Range rotasi -60 sampai +60 derajat
                extremeRotation: 90,    // Kadang 90 derajat
                useExtremeRotation: true
            };
            
            // ==================== UTILITY FUNCTIONS ====================
            
            function random(min, max) {
                return Math.random() * (max - min) + min;
            }
            
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
            
            // ==================== GENERATE ROTASI RANDOM ====================
            
            function getRandomRotation() {
                const rotationType = Math.random();
                
                // 50%: rotasi normal (-45 sampai +45)
                if (rotationType < 0.5) {
                    return randomInt(-45, 45);
                }
                // 35%: rotasi sedang (-75 sampai +75)
                else if (rotationType < 0.85) {
                    return randomInt(-75, 75);
                }
                // 15%: rotasi ekstrim (90 atau -90) - TIDAK TERBALIK
                else if (CONFIG.useExtremeRotation) {
                    return Math.random() > 0.5 ? 90 : -90;
                }
                return randomInt(-30, 30);
            }
            
            // ==================== HITUNG JUMLAH ITEM YANG DIBUTUHKAN ====================
            
            function calculateRequiredItems() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const avgSize = CONFIG.baseSize;
                const spacing = CONFIG.gap;
                
                // Hitung berapa banyak item yang muat secara horizontal dan vertikal
                const cols = Math.ceil(viewportWidth / (avgSize + spacing)) + 2; // +2 untuk tepi
                const rows = Math.ceil(viewportHeight / (avgSize + spacing)) + 2;
                
                const totalItems = cols * rows;
                console.log(`[BG] Viewport: ${viewportWidth}x${viewportHeight}, Items needed: ~${totalItems} (${cols}x${rows})`);
                
                return {
                    count: totalItems,
                    cols: cols,
                    rows: rows
                };
            }
            
            // ==================== GENERATE POSISI GRID PADAT ====================
            
            function generateGridPositions(itemCount, cols, rows) {
                const positions = [];
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const avgSize = CONFIG.baseSize;
                const spacing = CONFIG.gap;
                
                // Hitung lebar dan tinggi grid
                const totalWidth = cols * (avgSize + spacing);
                const totalHeight = rows * (avgSize + spacing);
                
                // Mulai dari kiri atas dengan sedikit offset agar tidak ada celah di tepi
                const startX = (viewportWidth - totalWidth) / 2 + (avgSize / 2);
                const startY = (viewportHeight - totalHeight) / 2 + (avgSize / 2);
                
                let index = 0;
                for (let row = 0; row < rows && index < itemCount; row++) {
                    for (let col = 0; col < cols && index < itemCount; col++) {
                        // Posisi X dan Y dalam pixel
                        let x = startX + (col * (avgSize + spacing));
                        let y = startY + (row * (avgSize + spacing));
                        
                        // Tambahkan sedikit random offset agar tidak terlalu rapi (tetap padat)
                        const offsetX = randomInt(-5, 5);
                        const offsetY = randomInt(-5, 5);
                        x += offsetX;
                        y += offsetY;
                        
                        // Konversi ke persentase
                        const xPercent = (x / viewportWidth) * 100;
                        const yPercent = (y / viewportHeight) * 100;
                        
                        positions.push({
                            x: Math.min(Math.max(xPercent, 0), 100),
                            y: Math.min(Math.max(yPercent, 0), 100),
                            col: col,
                            row: row
                        });
                        
                        index++;
                    }
                }
                
                return positions;
            }
            
            // ==================== CEK APAKAH ADA OVERLAP ====================
            
            function hasOverlap(newX, newY, size, existingItems, minDistance) {
                for (const item of existingItems) {
                    const dx = Math.abs(item.x - newX);
                    const dy = Math.abs(item.y - newY);
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < minDistance) {
                        return true;
                    }
                }
                return false;
            }
            
            // ==================== LOAD TGS FILES VIA API ====================
            
            async function fetchTgsFiles() {
                try {
                    console.log('[BG] Fetching TGS files from:', BG_PATH);
                    
                    const response = await fetch('/api/bg-files');
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.files && data.files.length > 0) {
                            tgsFiles = data.files;
                            console.log(`[BG] Found ${tgsFiles.length} TGS files via API`);
                            return;
                        }
                    }
                    
                    // Fallback
                    console.warn('[BG] API not available, using fallback');
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                    
                } catch (error) {
                    console.error('[BG] Error fetching TGS files:', error);
                    tgsFiles = ['empty-auctions.tgs', 'none-username-storage.tgs', 'empty-market-page.tgs'];
                }
            }
            
            // ==================== LOAD SINGLE TGS ====================
            
            async function loadSingleTGS(fileName, instanceIndex, position, size, rotation, zIndex) {
                return new Promise((resolve) => {
                    const url = `${BG_PATH}${fileName}`;
                    
                    fetch(url)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.arrayBuffer();
                        })
                        .then(arrayBuffer => {
                            const compressed = new Uint8Array(arrayBuffer);
                            let animationData;
                            
                            try {
                                const decompressed = window.pako.ungzip(compressed, { to: 'string' });
                                animationData = JSON.parse(decompressed);
                            } catch (e) {
                                const text = new TextDecoder().decode(compressed);
                                animationData = JSON.parse(text);
                            }
                            
                            const itemDiv = document.createElement('div');
                            itemDiv.className = 'tgs-item';
                            itemDiv.style.position = 'absolute';
                            itemDiv.style.left = `${position.x}%`;
                            itemDiv.style.top = `${position.y}%`;
                            itemDiv.style.width = `${size}px`;
                            itemDiv.style.height = `${size}px`;
                            itemDiv.style.zIndex = zIndex;
                            itemDiv.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                            itemDiv.style.willChange = 'transform';
                            
                            container.appendChild(itemDiv);
                            
                            const anim = window.lottie.loadAnimation({
                                container: itemDiv,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true,
                                animationData: animationData,
                                rendererSettings: {
                                    preserveAspectRatio: 'xMidYMid meet',
                                    clearCanvas: true
                                }
                            });
                            
                            animations.push({
                                id: `${fileName}_${instanceIndex}`,
                                animation: anim,
                                element: itemDiv,
                                size: size,
                                position: position,
                                rotation: rotation
                            });
                            
                            resolve(true);
                        })
                        .catch(error => {
                            console.error(`[BG] Failed to load ${fileName}:`, error);
                            resolve(false);
                        });
                });
            }
            
            // ==================== RENDER WALLPAPER PADAT ====================
            
            async function renderWallpaper() {
                if (isRendering) return;
                isRendering = true;
                
                if (!tgsFiles.length) {
                    console.warn('[BG] No TGS files to render');
                    hideLoading();
                    isRendering = false;
                    return;
                }
                
                // Hitung jumlah item yang dibutuhkan
                const { count: requiredItems, cols, rows } = calculateRequiredItems();
                
                // Generate posisi grid yang padat
                const positions = generateGridPositions(requiredItems, cols, rows);
                
                console.log(`[BG] Rendering ${positions.length} wallpaper items (${cols}x${rows} grid)`);
                
                // Update loading text
                const loadingText = document.querySelector('.loading-text');
                
                // Siapkan array untuk menyimpan semua promise
                const loadPromises = [];
                let itemIndex = 0;
                
                // Ulangi file TGS secara bergantian (round-robin) agar variasi
                for (let i = 0; i < positions.length; i++) {
                    const position = positions[i];
                    const fileIndex = i % tgsFiles.length;
                    const fileName = tgsFiles[fileIndex];
                    
                    // Ukuran - normal, tidak ada yang terlalu kecil
                    let size = CONFIG.baseSize + randomInt(-CONFIG.sizeVariation, CONFIG.sizeVariation);
                    size = Math.min(Math.max(size, CONFIG.minSize), CONFIG.maxSize);
                    
                    const rotation = getRandomRotation();
                    const zIndex = randomInt(1, 3);
                    
                    const promise = loadSingleTGS(fileName, i, position, size, rotation, zIndex);
                    loadPromises.push(promise);
                    
                    // Update progress setiap 10 item
                    if (i % 10 === 0 && loadingText) {
                        loadingText.textContent = `Loading wallpaper patterns... ${Math.round((i / positions.length) * 100)}%`;
                    }
                    
                    // Delay kecil agar tidak overload
                    await new Promise(resolve => setTimeout(resolve, 5));
                }
                
                // Tunggu semua selesai
                await Promise.allSettled(loadPromises);
                
                console.log(`[BG] Wallpaper ready with ${animations.length} items (no gaps, no overlap)`);
                hideLoading();
                isRendering = false;
            }
            
            // ==================== REPOSITION ON RESIZE ====================
            
            let resizeTimeout;
            async function handleResize() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(async () => {
                    console.log('[BG] Window resized, repositioning wallpaper...');
                    
                    // Hapus semua animasi yang ada
                    for (const anim of animations) {
                        if (anim.animation) anim.animation.destroy();
                        if (anim.element && anim.element.parentNode) {
                            anim.element.parentNode.removeChild(anim.element);
                        }
                    }
                    animations = [];
                    
                    // Render ulang dengan ukuran baru
                    await renderWallpaper();
                }, 300);
            }
            
            // ==================== HIDE LOADING ====================
            
            function hideLoading() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }
            }
            
            // ==================== INITIALIZATION ====================
            
            async function init() {
                console.log('[BG] Initializing wallpaper TGS patterns...');
                
                if (!container) {
                    container = document.getElementById('tgsBackground');
                    if (!container) {
                        console.error('[BG] Container not found');
                        return;
                    }
                }
                
                await fetchTgsFiles();
                await renderWallpaper();
                
                // Listen to resize
                window.addEventListener('resize', handleResize);
                
                console.log('[BG] Wallpaper TGS patterns ready - PADAT, TIDAK SALING TIMPA');
            }
            
            // Start initialization
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // Export untuk debugging
            window.bgTGS = {
                reload: () => {
                    handleResize();
                },
                animations: () => animations,
                files: () => tgsFiles,
                count: () => animations.length
            };
        })();
    </script>
</body>
</html>

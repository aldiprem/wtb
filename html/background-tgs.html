<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TGS Sticker Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .studio-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Sidebar Tools */
        .tools-sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .tools-sidebar h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Canvas Settings */
        .canvas-settings {
            margin-bottom: 25px;
        }

        .setting-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .setting-row input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            font-size: 13px;
        }

        .setting-row input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .setting-row button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        /* Background Options */
        .bg-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .bg-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .bg-btn.active {
            border-color: #00ff88;
            transform: scale(1.05);
        }

        .bg-btn.white { background: #ffffff; }
        .bg-btn.black { background: #0a0a0a; }
        .bg-btn.transparent { background: repeating-conic-gradient(#ccc 0% 25%, #eee 0% 50%); background-size: 10px 10px; }
        .bg-btn.grid { background: repeating-linear-gradient(90deg, #ddd 0px, #ddd 1px, transparent 1px, transparent 20px), repeating-linear-gradient(0deg, #ddd 0px, #ddd 1px, transparent 1px, transparent 20px); background-color: #fff; }

        /* Color Picker */
        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .color-picker-row input {
            width: 50px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .color-picker-row span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            flex: 1;
        }

        /* Pattern Options */
        .pattern-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .pattern-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 6px 12px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pattern-btn.active {
            background: #00ff88;
            color: #1a1a2e;
            border-color: #00ff88;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .action-btn.success {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .action-btn.danger {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .action-btn.warning {
            background: linear-gradient(135deg, #f6d365, #fda085);
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            min-width: 500px;
        }

        .canvas-wrapper {
            background: #2a2a3e;
            border-radius: 20px;
            padding: 20px;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #stickerLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .sticker-item {
            position: absolute;
            pointer-events: auto;
            cursor: grab;
            transform-origin: center center;
        }

        .sticker-item:active {
            cursor: grabbing;
        }

        .sticker-item.selected {
            outline: 3px solid #00ff88;
            outline-offset: 2px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.5));
        }

        /* Info Bar */
        .info-bar {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            color: white;
            font-size: 13px;
        }

        .info-bar span {
            color: #00ff88;
            font-weight: 600;
        }

        /* Upload Area */
        .upload-mini {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-mini:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .upload-mini span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 10px;
        }
    </style>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="studio-container">
        <!-- Sidebar Tools -->
        <div class="tools-sidebar">
            <h3>📐 Canvas Settings</h3>
            <div class="canvas-settings">
                <div class="setting-row">
                    <input type="number" id="canvasWidth" placeholder="Width" value="800">
                    <input type="number" id="canvasHeight" placeholder="Height" value="600">
                    <button id="resizeCanvasBtn">Resize</button>
                </div>
            </div>

            <h3>🎨 Background</h3>
            <div class="bg-options">
                <div class="bg-btn white" data-bg="white"></div>
                <div class="bg-btn black" data-bg="black"></div>
                <div class="bg-btn transparent" data-bg="transparent"></div>
                <div class="bg-btn grid" data-bg="grid"></div>
            </div>
            <div class="color-picker-row">
                <input type="color" id="customColorPicker" value="#ffffff">
                <span>Custom Color</span>
            </div>

            <h3>📐 Pattern</h3>
            <div class="pattern-options">
                <button class="pattern-btn" data-pattern="none">None</button>
                <button class="pattern-btn" data-pattern="dots">Dots</button>
                <button class="pattern-btn" data-pattern="lines">Lines</button>
                <button class="pattern-btn" data-pattern="cross">Cross</button>
                <button class="pattern-btn" data-pattern="grid">Grid</button>
            </div>

            <h3>🛠️ Actions</h3>
            <div class="action-buttons">
                <button id="uploadBtn" class="action-btn primary">📁 Upload TGS</button>
                <button id="duplicateBtn" class="action-btn">📋 Duplicate</button>
                <button id="deleteBtn" class="action-btn danger">🗑️ Delete</button>
                <button id="bringToFrontBtn" class="action-btn">⬆️ Bring to Front</button>
                <button id="sendToBackBtn" class="action-btn">⬇️ Send to Back</button>
                <button id="exportBtn" class="action-btn success">📸 Export PNG</button>
                <button id="clearAllBtn" class="action-btn warning">🗑️ Clear All</button>
            </div>

            <div class="upload-mini" id="uploadMini">
                <span>📁 Drag & drop .tgs files here</span>
            </div>
            <input type="file" id="fileInput" accept=".tgs" multiple style="display: none">
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <div class="canvas-wrapper">
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="mainCanvas" width="800" height="600"></canvas>
                    <div id="stickerLayer"></div>
                </div>
            </div>
            <div class="info-bar">
                <div>📊 Stickers: <span id="stickerCount">0</span></div>
                <div>🖱️ Selected: <span id="selectedId">None</span></div>
                <div>💡 Click sticker | Drag to move | Green corner = resize | Yellow corner = rotate</div>
            </div>
        </div>
    </div>

    <script>
        class TGSStudio {
            constructor() {
                this.canvas = document.getElementById('mainCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('canvasContainer');
                this.stickerLayer = document.getElementById('stickerLayer');
                this.stickers = [];
                this.selectedId = null;
                this.animations = new Map();
                this.bgColor = '#ffffff';
                this.pattern = 'none';
                this.isDragging = false;
                this.dragStart = { x: 0, y: 0 };
                this.isResizing = false;
                this.isRotating = false;
                
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.renderBackground();
            }

            setupEventListeners() {
                // Canvas resize
                document.getElementById('resizeCanvasBtn').addEventListener('click', () => this.resizeCanvas());
                
                // Background
                document.querySelectorAll('.bg-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.setBackground(btn.dataset.bg));
                });
                document.getElementById('customColorPicker').addEventListener('change', (e) => {
                    this.bgColor = e.target.value;
                    this.pattern = 'none';
                    this.renderBackground();
                });
                
                // Pattern
                document.querySelectorAll('.pattern-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.pattern = btn.dataset.pattern;
                        this.renderBackground();
                        document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                // Actions
                document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
                document.getElementById('duplicateBtn').addEventListener('click', () => this.duplicateSticker());
                document.getElementById('deleteBtn').addEventListener('click', () => this.deleteSticker());
                document.getElementById('bringToFrontBtn').addEventListener('click', () => this.bringToFront());
                document.getElementById('sendToBackBtn').addEventListener('click', () => this.sendToBack());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportPNG());
                document.getElementById('clearAllBtn').addEventListener('click', () => this.clearAll());
                
                // File upload
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFiles(e.target.files));
                
                // Drag & drop
                const uploadMini = document.getElementById('uploadMini');
                uploadMini.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadMini.style.borderColor = '#00ff88';
                });
                uploadMini.addEventListener('dragleave', () => {
                    uploadMini.style.borderColor = 'rgba(255,255,255,0.2)';
                });
                uploadMini.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadMini.style.borderColor = 'rgba(255,255,255,0.2)';
                    const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.tgs'));
                    this.handleFiles(files);
                });
            }

            resizeCanvas() {
                const width = parseInt(document.getElementById('canvasWidth').value);
                const height = parseInt(document.getElementById('canvasHeight').value);
                
                if (width > 0 && height > 0 && width <= 4000 && height <= 4000) {
                    this.canvas.width = width;
                    this.canvas.height = height;
                    this.container.style.width = `${width}px`;
                    this.container.style.height = `${height}px`;
                    this.renderBackground();
                    
                    // Reposition stickers if needed
                    this.stickers.forEach(sticker => {
                        sticker.x = Math.min(sticker.x, width - sticker.width);
                        sticker.y = Math.min(sticker.y, height - sticker.height);
                        this.updateStickerElement(sticker);
                    });
                }
            }

            setBackground(type) {
                switch(type) {
                    case 'white':
                        this.bgColor = '#ffffff';
                        this.pattern = 'none';
                        break;
                    case 'black':
                        this.bgColor = '#0a0a0a';
                        this.pattern = 'none';
                        break;
                    case 'transparent':
                        this.bgColor = 'transparent';
                        this.pattern = 'none';
                        break;
                    case 'grid':
                        this.bgColor = '#ffffff';
                        this.pattern = 'grid';
                        break;
                }
                this.renderBackground();
                
                document.querySelectorAll('.bg-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.bg-btn.${type}`)?.classList.add('active');
            }

            renderBackground() {
                // Clear canvas
                if (this.bgColor === 'transparent') {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                } else {
                    this.ctx.fillStyle = this.bgColor;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                // Draw pattern
                const size = 20;
                if (this.pattern === 'dots') {
                    this.ctx.fillStyle = '#cccccc';
                    for (let x = 0; x < this.canvas.width; x += size) {
                        for (let y = 0; y < this.canvas.height; y += size) {
                            this.ctx.beginPath();
                            this.ctx.arc(x, y, 2, 0, Math.PI * 2);
                            this.ctx.fill();
                        }
                    }
                } else if (this.pattern === 'lines') {
                    this.ctx.strokeStyle = '#dddddd';
                    this.ctx.lineWidth = 1;
                    for (let x = 0; x < this.canvas.width; x += size) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(x, 0);
                        this.ctx.lineTo(x, this.canvas.height);
                        this.ctx.stroke();
                    }
                    for (let y = 0; y < this.canvas.height; y += size) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, y);
                        this.ctx.lineTo(this.canvas.width, y);
                        this.ctx.stroke();
                    }
                } else if (this.pattern === 'cross') {
                    this.ctx.strokeStyle = '#dddddd';
                    this.ctx.lineWidth = 1;
                    for (let x = 0; x < this.canvas.width; x += size) {
                        for (let y = 0; y < this.canvas.height; y += size) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(x - 5, y);
                            this.ctx.lineTo(x + 5, y);
                            this.ctx.moveTo(x, y - 5);
                            this.ctx.lineTo(x, y + 5);
                            this.ctx.stroke();
                        }
                    }
                } else if (this.pattern === 'grid') {
                    this.ctx.strokeStyle = '#dddddd';
                    this.ctx.lineWidth = 1;
                    const gridSize = 25;
                    for (let x = 0; x <= this.canvas.width; x += gridSize) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(x, 0);
                        this.ctx.lineTo(x, this.canvas.height);
                        this.ctx.stroke();
                    }
                    for (let y = 0; y <= this.canvas.height; y += gridSize) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, y);
                        this.ctx.lineTo(this.canvas.width, y);
                        this.ctx.stroke();
                    }
                }
            }

            async handleFiles(files) {
                for (const file of files) {
                    await this.loadSticker(file);
                }
                document.getElementById('fileInput').value = '';
                this.updateInfo();
            }

            async loadSticker(file) {
                try {
                    const arrayBuffer = await this.readFile(file);
                    const compressed = new Uint8Array(arrayBuffer);
                    let animationData;
                    
                    try {
                        const decompressed = pako.ungzip(compressed, { to: 'string' });
                        animationData = JSON.parse(decompressed);
                    } catch(e) {
                        const text = new TextDecoder().decode(compressed);
                        animationData = JSON.parse(text);
                    }
                    
                    const sticker = {
                        id: Date.now() + Math.random(),
                        file: file.name,
                        animationData: animationData,
                        x: (this.canvas.width / 2) - 75,
                        y: (this.canvas.height / 2) - 75,
                        width: 150,
                        height: 150,
                        scale: 1,
                        rotation: 0,
                        zIndex: this.stickers.length
                    };
                    
                    this.stickers.push(sticker);
                    await this.createStickerElement(sticker);
                    this.updateInfo();
                    
                } catch(err) {
                    console.error(err);
                    alert('Error loading sticker: ' + err.message);
                }
            }

            readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            async createStickerElement(sticker) {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                div.id = `sticker-${sticker.id}`;
                div.style.left = `${sticker.x}px`;
                div.style.top = `${sticker.y}px`;
                div.style.width = `${sticker.width}px`;
                div.style.height = `${sticker.height}px`;
                div.style.transform = `rotate(${sticker.rotation}deg)`;
                div.style.zIndex = sticker.zIndex;
                
                const lottieContainer = document.createElement('div');
                lottieContainer.style.width = '100%';
                lottieContainer.style.height = '100%';
                lottieContainer.style.pointerEvents = 'none';
                div.appendChild(lottieContainer);
                
                // Handles
                const resizeHandle = document.createElement('div');
                resizeHandle.style.position = 'absolute';
                resizeHandle.style.bottom = '-8px';
                resizeHandle.style.right = '-8px';
                resizeHandle.style.width = '16px';
                resizeHandle.style.height = '16px';
                resizeHandle.style.background = '#00ff88';
                resizeHandle.style.borderRadius = '50%';
                resizeHandle.style.cursor = 'nw-resize';
                resizeHandle.style.display = 'none';
                
                const rotateHandle = document.createElement('div');
                rotateHandle.style.position = 'absolute';
                rotateHandle.style.top = '-8px';
                rotateHandle.style.right = '-8px';
                rotateHandle.style.width = '16px';
                rotateHandle.style.height = '16px';
                rotateHandle.style.background = '#ffaa00';
                rotateHandle.style.borderRadius = '50%';
                rotateHandle.style.cursor = 'grab';
                rotateHandle.style.display = 'none';
                
                div.appendChild(resizeHandle);
                div.appendChild(rotateHandle);
                
                // Events
                div.addEventListener('mousedown', (e) => this.onStickerMouseDown(e, sticker));
                resizeHandle.addEventListener('mousedown', (e) => this.onResizeStart(e, sticker));
                rotateHandle.addEventListener('mousedown', (e) => this.onRotateStart(e, sticker));
                
                this.stickerLayer.appendChild(div);
                
                const anim = lottie.loadAnimation({
                    container: lottieContainer,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    animationData: sticker.animationData,
                    rendererSettings: { preserveAspectRatio: 'xMidYMid meet' }
                });
                
                this.animations.set(sticker.id, anim);
            }

            updateStickerElement(sticker) {
                const element = document.getElementById(`sticker-${sticker.id}`);
                if (element) {
                    element.style.left = `${sticker.x}px`;
                    element.style.top = `${sticker.y}px`;
                    element.style.width = `${sticker.width}px`;
                    element.style.height = `${sticker.height}px`;
                    element.style.transform = `rotate(${sticker.rotation}deg)`;
                    element.style.zIndex = sticker.zIndex;
                }
            }

            selectSticker(id) {
                this.selectedId = id;
                document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('selected'));
                const selected = document.getElementById(`sticker-${id}`);
                if (selected) {
                    selected.classList.add('selected');
                    // Show handles
                    selected.querySelectorAll('div[style*="position: absolute"]').forEach(h => h.style.display = 'block');
                }
                document.getElementById('selectedId').innerText = id ? id.toString().slice(-8) : 'None';
            }

            onStickerMouseDown(e, sticker) {
                if (e.target.style.cursor === 'nw-resize' || e.target.style.cursor === 'grab') return;
                
                e.stopPropagation();
                this.selectSticker(sticker.id);
                
                this.isDragging = true;
                this.dragStart = {
                    x: e.clientX - sticker.x,
                    y: e.clientY - sticker.y
                };
                
                const onMouseMove = (moveEvent) => {
                    if (!this.isDragging) return;
                    let newX = moveEvent.clientX - this.dragStart.x;
                    let newY = moveEvent.clientY - this.dragStart.y;
                    newX = Math.max(0, Math.min(newX, this.canvas.width - sticker.width));
                    newY = Math.max(0, Math.min(newY, this.canvas.height - sticker.height));
                    sticker.x = newX;
                    sticker.y = newY;
                    this.updateStickerElement(sticker);
                };
                
                const onMouseUp = () => {
                    this.isDragging = false;
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            }

            onResizeStart(e, sticker) {
                e.stopPropagation();
                const startX = e.clientX;
                const startWidth = sticker.width;
                
                const onMouseMove = (moveEvent) => {
                    const delta = moveEvent.clientX - startX;
                    const newWidth = Math.max(40, Math.min(500, startWidth + delta));
                    sticker.width = newWidth;
                    sticker.height = newWidth;
                    this.updateStickerElement(sticker);
                };
                
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            }

            onRotateStart(e, sticker) {
                e.stopPropagation();
                const element = document.getElementById(`sticker-${sticker.id}`);
                const rect = element.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const getAngle = (clientX, clientY) => Math.atan2(clientY - centerY, clientX - centerX) * 180 / Math.PI;
                const startAngle = getAngle(e.clientX, e.clientY);
                const startRotation = sticker.rotation;
                
                const onMouseMove = (moveEvent) => {
                    const currentAngle = getAngle(moveEvent.clientX, moveEvent.clientY);
                    let delta = currentAngle - startAngle;
                    sticker.rotation = startRotation + delta;
                    this.updateStickerElement(sticker);
                };
                
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            }

            duplicateSticker() {
                if (!this.selectedId) {
                    alert('Select a sticker first!');
                    return;
                }
                const original = this.stickers.find(s => s.id === this.selectedId);
                if (!original) return;
                
                const newSticker = {
                    ...original,
                    id: Date.now() + Math.random(),
                    x: original.x + 30,
                    y: original.y + 30,
                    zIndex: this.stickers.length
                };
                
                this.stickers.push(newSticker);
                this.createStickerElement(newSticker);
                this.selectSticker(newSticker.id);
                this.updateInfo();
            }

            deleteSticker() {
                if (!this.selectedId) {
                    alert('Select a sticker first!');
                    return;
                }
                const index = this.stickers.findIndex(s => s.id === this.selectedId);
                if (index !== -1) {
                    const anim = this.animations.get(this.selectedId);
                    if (anim) anim.destroy();
                    this.animations.delete(this.selectedId);
                    document.getElementById(`sticker-${this.selectedId}`)?.remove();
                    this.stickers.splice(index, 1);
                    this.selectedId = null;
                    this.updateInfo();
                    document.getElementById('selectedId').innerText = 'None';
                }
            }

            bringToFront() {
                if (!this.selectedId) return;
                const sticker = this.stickers.find(s => s.id === this.selectedId);
                if (sticker) {
                    sticker.zIndex = this.stickers.length;
                    this.stickers.sort((a, b) => a.zIndex - b.zIndex);
                    this.stickers.forEach((s, i) => {
                        s.zIndex = i;
                        this.updateStickerElement(s);
                    });
                    this.selectSticker(sticker.id);
                }
            }

            sendToBack() {
                if (!this.selectedId) return;
                const sticker = this.stickers.find(s => s.id === this.selectedId);
                if (sticker) {
                    sticker.zIndex = -1;
                    this.stickers.sort((a, b) => a.zIndex - b.zIndex);
                    this.stickers.forEach((s, i) => {
                        s.zIndex = i;
                        this.updateStickerElement(s);
                    });
                    this.selectSticker(sticker.id);
                }
            }

            clearAll() {
                if (confirm('Clear all stickers?')) {
                    this.animations.forEach(anim => anim.destroy());
                    this.animations.clear();
                    this.stickers = [];
                    this.stickerLayer.innerHTML = '';
                    this.selectedId = null;
                    this.updateInfo();
                    document.getElementById('selectedId').innerText = 'None';
                }
            }

            async exportPNG() {
                // Pause animations
                const wasPlaying = [];
                this.animations.forEach((anim, id) => {
                    wasPlaying[id] = !anim.isPaused;
                    anim.pause();
                });
                
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(this.container, {
                            scale: 2,
                            backgroundColor: this.bgColor === 'transparent' ? null : this.bgColor,
                            useCORS: true,
                            logging: false
                        });
                        const link = document.createElement('a');
                        link.download = `tgs-export-${Date.now()}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    } catch(err) {
                        console.error(err);
                        alert('Export failed: ' + err.message);
                    }
                    
                    // Resume animations
                    this.animations.forEach((anim, id) => {
                        if (wasPlaying[id]) anim.play();
                    });
                }, 100);
            }

            updateInfo() {
                document.getElementById('stickerCount').innerText = this.stickers.length;
            }
        }

        // Initialize
        const studio = new TGSStudio();
        
        // Set default pattern button active
        document.querySelector('.pattern-btn[data-pattern="none"]')?.classList.add('active');
        document.querySelector('.bg-btn.white')?.classList.add('active');
    </script>
</body>

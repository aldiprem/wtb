<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BarackGift Store</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/games/css/games.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header dengan profil user -->
        <header class="glass-header">
            <div class="header-right">
                <div class="user-profile" id="userProfile">
                    <div class="profile-avatar" id="profileAvatar">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
                    </div>
                    <div class="profile-info">
                        <span class="profile-name" id="profileName">Telegram User</span>
                        <span class="profile-status" id="profileStatus">Not Connected</span>
                    </div>
                    <button class="logout-btn" id="logoutBtn" style="display: none;">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content dengan scroll -->
        <main class="main-content" id="mainContent">
            <div class="content-wrapper" id="contentWrapper">
                <!-- Konten akan diisi oleh JavaScript -->
                <div class="empty-state">
                    <div class="empty-icon">✨</div>
                    <h3>Selamat Datang</h3>
                    <p>Pilih menu di bawah untuk memulai</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-page="games">
                <div class="nav-icon">🎮</div>
                <span class="nav-label">Games</span>
            </div>
            <div class="nav-item" data-page="market">
                <div class="nav-icon">🛒</div>
                <span class="nav-label">Market</span>
            </div>
            <div class="nav-item" data-page="profile">
                <div class="nav-icon">👤</div>
                <span class="nav-label">Profil</span>
            </div>
        </nav>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/global.js"></script>
    <script src="/games/js/games.js"></script>
</body>
</html>

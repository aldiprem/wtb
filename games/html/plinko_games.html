<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plinko - BarackGift</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/games/css/games.css">
    <link rel="stylesheet" href="/games/css/plinko.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Header dengan balance -->
        <header class="glass-header">
            <div class="app-title">
                <h2>BarackGift</h2>
            </div>
            <div class="balance-container">
                <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="ton-logo">
                <span id="userBalance">0 TON</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="content-area">
            
            <!-- Stats Header - Baris atas dengan views dan hash -->
            <div class="stats-header">
                <div class="stats-views">
                    <div class="stat-views-card">
                        <i class="fas fa-eye"></i>
                        <span id="totalViews">0</span>
                    </div>
                </div>
                <div class="stat-round-header" id="roundHashContainer" onclick="copyRoundHash()">
                    <i class="fas fa-hashtag"></i>
                    <code id="roundHash" class="round-hash-code">-</code>
                    <i class="fas fa-copy copy-icon"></i>
                </div>
            </div>

            <!-- 2 Stats Row - Jackpot dan Lasted dalam 1 baris -->
            <div class="stats-two-row">
                <div class="stat-jackpot">
                    <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                    <div class="stat-info-vertical">
                        <span class="stat-value" id="totalWinAmount">0</span>
                        <span class="stat-value-multiplier" id="biggestWin">0x</span>
                    </div>
                </div>
                
                <div class="stat-lasted" id="statLasted">
                    <div class="stat-avatar" id="userAvatarStat">
                        <img id="userAvatarImg" src="" alt="Avatar">
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="lastPlayerName">-</span>
                        <span class="stat-sub" id="lastPlayerMultiplier">0x</span>
                    </div>
                </div>
            </div>

            <!-- Game Board -->
            <div class="game-board">
                <div class="plinko-canvas-container">
                    <canvas id="plinkoCanvas" width="800" height="500"></canvas>
                    <div id="ballDropIndicator" class="ball-indicator" style="display: none;">
                        <i class="fas fa-circle"></i> Ball Dropping...
                    </div>
                    
                    <!-- Multiplier Slots -->
                    <div class="multiplier-slots-container" id="multiplierSlotsContainer">
                        <div class="multiplier-slots-wrapper" id="multiplierSlotsWrapper"></div>
                    </div>
                </div>

                <!-- Tombol Utama: PLACE (kiri) dan DROP BALL (kanan) -->
                <div class="action-buttons-row">
                    <button id="placeBetBtn" class="place-bet-btn">
                        <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="ton-logo-md">
                        PLACE
                    </button>
                    <button id="playBtn" class="play-btn">
                        <i class="fas fa-play"></i> DROP BALL
                    </button>
                </div>

                <!-- Tombol Risk Level (di atas tombol place bet) -->
                <div class="risk-level-trigger" id="riskLevelTrigger">
                    <i class="fas fa-chart-line"></i> Level <i class="fas fa-chevron-up" id="riskChevron"></i>
                </div>

                <!-- Panel Risk Level (muncul ke atas) -->
                <div class="risk-panel" id="riskPanel" style="display: none;">
                    <div class="risk-panel-header">
                        <span>Pilih Risk Level</span>
                        <button class="close-risk-panel" id="closeRiskPanel">&times;</button>
                    </div>
                    <div class="risk-selector-panel">
                        <button class="risk-btn low" data-risk="low">Low</button>
                        <button class="risk-btn medium active" data-risk="medium">Medium</button>
                        <button class="risk-btn high" data-risk="high">High</button>
                    </div>
                </div>

                <!-- Result Display -->
                <div id="resultDisplay" class="result-display" style="display: none;">
                    <div class="result-content">
                        <i class="fas fa-chart-line"></i>
                        <span id="resultMultiplier">0x</span>
                        <span id="resultWin">Win: 0</span>
                    </div>
                </div>
            </div>

            <!-- History Section - Tanpa border pagination -->
            <div class="history-section">
                <div class="section-header">
                    <h3><i class="fas fa-history"></i> Riwayat Permainan</h3>
                    <button id="refreshHistory" class="refresh-btn"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="table-container" style="max-height: 300px; overflow-y: auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Round Hash</th>
                                <th>Pemain</th>
                                <th>Taruhan</th>
                                <th>Multiplier</th>
                                <th>Kemenangan</th>
                                <th>Waktu</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                        </tbody>
                    \d+
                </div>
            </div>

        </main>

        <!-- Floating Bottom Navigation -->
        <nav class="floating-nav">
            <button class="nav-item" onclick="window.location.href='/games'">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='/plinko-games'">
                <i class="fas fa-gamepad"></i>
                <span>Games</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/games'">
                <i class="fas fa-user-friends"></i>
                <span>Referral</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/profile'">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
        </nav>

    </div>

    <!-- Bottom Sheet Modal (Place Bet) -->
    <div id="placeBetSheet" class="bottom-sheet">
        <div class="bottom-sheet-content">
            <div class="bottom-sheet-header">
                <h3>Place Bet</h3>
                <button class="close-sheet" id="closeSheetBtn">&times;</button>
            </div>
            
            <!-- Tab Navigation -->
            <div class="sheet-tabs">
                <button class="sheet-tab active" data-tab="gift-tab">
                    <i class="fas fa-gift"></i> GIFT
                </button>
                <button class="sheet-tab" data-tab="ton-tab">
                    <img src="https://companel.shop/image/images-removebg-preview.png" alt="TON" class="ton-logo-sm">
                    TON BALANCE
                </button>
            </div>
            
            <!-- Tab Content: GIFT -->
            <div class="sheet-tab-content active" id="gift-tab">
                <div class="gift-content">
                    <div class="gift-icon-large">
                        <i class="fas fa-gift"></i>
                    </div>
                    <p class="gift-message">Gunakan Gift untuk bermain tanpa mengurangi saldo!</p>
                    <div class="gift-stats">
                        <span class="gift-label">Gifts tersedia:</span>
                        <span class="gift-value" id="userGifts">0</span>
                    </div>
                    <button class="btn-use-gift" id="useGiftBtn">
                        <i class="fas fa-gift"></i> Main dengan Gift
                    </button>
                </div>
            </div>
            
            <!-- Tab Content: TON BALANCE -->
            <div class="sheet-tab-content" id="ton-tab">
                <div class="bet-input-container">
                    <label class="bet-label-sheet">Jumlah Taruhan (TON)</label>
                    <input type="number" id="sheetBetAmount" class="bet-input-sheet" value="1.0" min="0.1" step="0.1">
                    
                    <!-- Quick Percent Buttons -->
                    <div class="quick-percent-buttons">
                        <button class="percent-btn" data-percent="25">25%</button>
                        <button class="percent-btn" data-percent="50">50%</button>
                        <button class="percent-btn" data-percent="75">75%</button>
                        <button class="percent-btn" data-percent="100">MAX</button>
                    </div>
                    
                    <div class="balance-info">
                        <span>Saldo TON Anda:</span>
                        <strong id="sheetUserBalance">0 TON</strong>
                    </div>
                    
                    <button id="confirmBetBtn" class="confirm-bet-btn">
                        <i class="fas fa-check-circle"></i> Konfirmasi Taruhan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/games/js/plinko_games.js"></script>
</body>
</html>

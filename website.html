<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Website Store</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/wtb/css/website.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Animasi untuk page navigation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(100%); }
        }
        
        .page-content {
            animation: slideUp 0.3s ease;
        }
        
        /* Font animations dari template */
        @keyframes pulseAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes bounceAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @keyframes fadeAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes rotateAnim {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideAnim {
            0% { transform: translateX(-10px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat Toko...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="website-container">
        <!-- HEADER: LOGO + NAMA STORE (CARD BORDER) -->
        <header class="store-header" id="storeHeader">
            <div class="store-logo-wrapper">
                <img id="storeLogo" src="https://via.placeholder.com/60x60/40a7e3/ffffff?text=Logo" alt="Logo" class="store-logo">
                <span id="storeName" class="store-name">Toko Online</span>
            </div>
        </header>

        <!-- BANNER SLIDER (LEMBARAN KERTAS) -->
        <div class="banner-slider-container" id="bannerSlider">
            <div class="banner-track" id="bannerTrack">
                <!-- Banner akan diisi JavaScript -->
            </div>
            <div class="banner-dots" id="bannerDots"></div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content" id="mainContent">
            <!-- Halaman akan diisi berdasarkan navigasi -->
        </main>

        <!-- BOTTOM NAVIGATION (BORDER PAGINATION) -->
        <nav class="bottom-nav" id="bottomNav">
            <div class="nav-items">
                <button class="nav-item active" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </button>
                <button class="nav-item" data-page="aktivitas">
                    <i class="fas fa-history"></i>
                    <span>Aktivitas</span>
                </button>
                <button class="nav-item" data-page="promo">
                    <i class="fas fa-bullhorn"></i>
                    <span>Promo</span>
                </button>
                <button class="nav-item" data-page="bank">
                    <i class="fas fa-university"></i>
                    <span>Bank</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profil</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- MODAL: Voucher -->
    <div class="modal" id="voucherModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-ticket-alt"></i> Klaim Voucher</h2>
                <button class="modal-close" id="closeVoucherModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="voucherForm">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Kode Voucher</label>
                        <input type="text" id="voucherCode" placeholder="Masukkan kode voucher" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelVoucherBtn">Batal</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-check"></i> Klaim
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: Deposit -->
    <div class="modal" id="depositModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-credit-card"></i> Deposit Saldo</h2>
                <button class="modal-close" id="closeDepositModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="depositForm">
                    <div class="form-group">
                        <label><i class="fas fa-money-bill"></i> Jumlah Deposit</label>
                        <input type="number" id="depositAmount" min="10000" step="1000" placeholder="Minimal Rp 10.000" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-university"></i> Metode Pembayaran</label>
                        <select id="paymentMethod" class="styled-select" required>
                            <option value="">-- Pilih Metode --</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelDepositBtn">Batal</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-check"></i> Lanjutkan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: Withdraw -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-money-bill-wave"></i> Withdraw</h2>
                <button class="modal-close" id="closeWithdrawModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="withdrawForm">
                    <div class="form-group">
                        <label><i class="fas fa-money-bill"></i> Jumlah Withdraw</label>
                        <input type="number" id="withdrawAmount" min="50000" step="1000" placeholder="Minimal Rp 50.000" required>
                        <small class="hint">Saldo Anda: <span id="userBalance">Rp 0</span></small>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-university"></i> Tujuan Rekening</label>
                        <select id="withdrawAccount" class="styled-select" required>
                            <option value="">-- Pilih Rekening Tujuan --</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelWithdrawBtn">Batal</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-check"></i> Withdraw
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/wtb/js/website.js"></script>
</body>
</html>

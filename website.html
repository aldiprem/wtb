<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Website Store</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/wtb/css/website.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat toko...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="website-container">
        <!-- Header dengan Logo & Nama Store (hanya di halaman utama) -->
        <header class="store-header" id="storeHeader">
            <div class="store-info-card" style="border-color: var(--primary-color);" id="storeInfoCard">
                <div class="store-logo" id="storeLogo">
                    <img src="" alt="Logo" id="logoImage" style="display: none;">
                    <i class="fas fa-store" id="logoIcon"></i>
                </div>
                <div class="store-name-container" id="storeNameContainer">
                    <h1 class="store-name" id="storeName">Toko Online</h1>
                </div>
            </div>
        </header>

        <!-- Banner Slider (hanya di halaman utama) -->
        <div class="banner-slider-container" id="bannerSlider">
            <div class="banner-slider" id="bannerSliderTrack">
                <!-- Banner akan diisi oleh JavaScript -->
            </div>
            <div class="banner-dots" id="bannerDots"></div>
            <button class="banner-nav banner-prev" id="bannerPrev"><i class="fas fa-chevron-left"></i></button>
            <button class="banner-nav banner-next" id="bannerNext"><i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="utama">
                <i class="fas fa-home"></i>
                <span>Utama</span>
            </button>
            <button class="nav-tab" data-page="aktivitas">
                <i class="fas fa-history"></i>
                <span>Aktivitas</span>
            </button>
            <button class="nav-tab" data-page="promo">
                <i class="fas fa-tags"></i>
                <span>Promo</span>
            </button>
            <button class="nav-tab" data-page="bank">
                <i class="fas fa-university"></i>
                <span>Bank</span>
            </button>
            <button class="nav-tab" data-page="profil">
                <i class="fas fa-user-circle"></i>
                <span>Profil</span>
            </button>
        </div>

        <!-- Pages Container -->
        <div class="pages-container">
            <!-- Page: Utama -->
            <div class="page active" id="page-utama">
                <!-- Layanan Section -->
                <div class="layanan-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-layer-group"></i>
                            Produk Layanan
                        </h2>
                        <a href="#" class="view-all-link" id="viewAllLayanan">
                            Lihat semua <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                    
                    <div class="layanan-grid" id="layananGrid">
                        <!-- Layanan akan diisi oleh JavaScript -->
                    </div>
                </div>

                <!-- Produk Tersedia Section -->
                <div class="produk-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-box"></i>
                            Produk Tersedia
                        </h2>
                    </div>

                    <!-- Filter Bar -->
                    <div class="filter-bar">
                        <div class="filter-dropdown">
                            <button class="filter-btn" id="filterLayananBtn">
                                <i class="fas fa-layer-group"></i>
                                <span id="selectedLayanan">Layanan</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="filter-menu" id="filterLayananMenu">
                                <!-- Akan diisi oleh JavaScript -->
                            </div>
                        </div>

                        <div class="filter-dropdown">
                            <button class="filter-btn" id="filterAplikasiBtn">
                                <i class="fas fa-mobile-alt"></i>
                                <span id="selectedAplikasi">Aplikasi</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="filter-menu" id="filterAplikasiMenu">
                                <!-- Akan diisi oleh JavaScript -->
                            </div>
                        </div>

                        <div class="filter-dropdown filter-item-sort">
                            <button class="filter-btn" id="filterItemBtn">
                                <i class="fas fa-box"></i>
                                <span id="selectedItem">Item</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="filter-menu" id="filterItemMenu">
                                <!-- Akan diisi oleh JavaScript -->
                            </div>
                        </div>

                        <div class="filter-dropdown sort-dropdown">
                            <button class="filter-btn" id="sortBtn">
                                <i class="fas fa-sort-amount-down"></i>
                                <span id="selectedSort">Sort By</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="filter-menu" id="sortMenu">
                                <button class="filter-option" data-sort="terlaris">
                                    <i class="fas fa-fire"></i> Terlaris
                                </button>
                                <button class="filter-option" data-sort="terbaru">
                                    <i class="fas fa-clock"></i> Terbaru
                                </button>
                                <button class="filter-option" data-sort="harga-rendah">
                                    <i class="fas fa-arrow-up"></i> Termurah
                                </button>
                                <button class="filter-option" data-sort="harga-tinggi">
                                    <i class="fas fa-arrow-down"></i> Termahal
                                </button>
                                <button class="filter-option" data-sort="stok-banyak">
                                    <i class="fas fa-cubes"></i> Stok Terbanyak
                                </button>
                                <button class="filter-option" data-sort="stok-sedikit">
                                    <i class="fas fa-cubes"></i> Stok Tersedikit
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Products Grid -->
                    <div class="products-grid" id="productsGrid">
                        <!-- Produk akan diisi oleh JavaScript -->
                    </div>

                    <!-- Pagination (fixed di bawah) -->
                    <div class="pagination-container" id="paginationContainer">
                        <div class="pagination" id="pagination">
                            <!-- Akan diisi oleh JavaScript -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Page: Aktivitas -->
            <div class="page" id="page-aktivitas">
                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-history"></i>
                        Aktivitas
                    </h2>
                </div>
                
                <div class="aktivitas-list" id="aktivitasList">
                    <!-- Akan diisi oleh JavaScript -->
                </div>
            </div>

            <!-- Page: Promo -->
            <div class="page" id="page-promo">
                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-tags"></i>
                        Promo
                    </h2>
                    <button class="voucher-btn" id="lihatVoucherBtn">
                        <i class="fas fa-ticket-alt"></i> Voucher Saya
                    </button>
                </div>

                <!-- Promo Banners -->
                <div class="promo-banners" id="promoBanners">
                    <!-- Promo akan diisi oleh JavaScript -->
                </div>

                <!-- Voucher Section -->
                <div class="voucher-section">
                    <h3 class="section-subtitle">
                        <i class="fas fa-ticket-alt"></i>
                        Voucher Tersedia
                    </h3>
                    <div class="voucher-grid" id="voucherGrid">
                        <!-- Voucher akan diisi oleh JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Page: Bank -->
            <div class="page" id="page-bank">
                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-university"></i>
                        Bank
                    </h2>
                    <div class="bank-balance" id="bankBalance">
                        <span class="balance-label">Saldo</span>
                        <span class="balance-value" id="userBalance">Rp 0</span>
                    </div>
                </div>

                <!-- Bank Actions -->
                <div class="bank-actions">
                    <button class="bank-action-btn" id="depositBtn">
                        <i class="fas fa-arrow-down"></i>
                        <span>Deposit</span>
                    </button>
                    <button class="bank-action-btn" id="withdrawBtn">
                        <i class="fas fa-arrow-up"></i>
                        <span>Withdraw</span>
                    </button>
                    <button class="bank-action-btn" id="transferBtn">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Transfer</span>
                    </button>
                </div>

                <!-- Rekening Tersedia -->
                <div class="rekening-section">
                    <h3 class="section-subtitle">
                        <i class="fas fa-credit-card"></i>
                        Rekening Tersedia
                    </h3>
                    <div class="rekening-grid" id="rekeningGrid">
                        <!-- Akan diisi oleh JavaScript -->
                    </div>
                </div>

                <!-- Payment Gateway -->
                <div class="gateway-section" id="gatewaySection">
                    <h3 class="section-subtitle">
                        <i class="fas fa-qrcode"></i>
                        Payment Gateway
                    </h3>
                    <div class="gateway-card" id="gatewayCard">
                        <!-- Akan diisi oleh JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Page: Profil -->
            <div class="page" id="page-profil">
                <div class="profile-header">
                    <div class="profile-avatar-large" id="profileAvatarLarge">
                        <img src="" alt="Profile" id="profileImage">
                    </div>
                    <div class="profile-info">
                        <h2 id="profileName">Loading...</h2>
                        <p id="profileUsername">@loading</p>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-card">
                        <span class="stat-value" id="profileOrders">0</span>
                        <span class="stat-label">Pesanan</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="profileSpent">Rp 0</span>
                        <span class="stat-label">Total Belanja</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="profileVouchers">0</span>
                        <span class="stat-label">Voucher</span>
                    </div>
                </div>

                <div class="profile-details">
                    <div class="detail-item">
                        <i class="fas fa-id-card"></i>
                        <div class="detail-content">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value" id="profileUserId">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-calendar"></i>
                        <div class="detail-content">
                            <span class="detail-label">Bergabung</span>
                            <span class="detail-value" id="profileJoined">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <div class="detail-content">
                            <span class="detail-label">Email</span>
                            <span class="detail-value" id="profileEmail">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <div class="detail-content">
                            <span class="detail-label">Telepon</span>
                            <span class="detail-value" id="profilePhone">-</span>
                        </div>
                    </div>
                </div>

                <!-- Force Subscribe Section -->
                <div class="force-subscribe-section" id="forceSubscribeSection">
                    <h3 class="section-subtitle">
                        <i class="fas fa-bell"></i>
                        Subscribe Channel
                    </h3>
                    <div class="force-list" id="forceList">
                        <!-- Akan diisi oleh JavaScript -->
                    </div>
                </div>

                <!-- Logout Button -->
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    Keluar
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/wtb/js/website.js"></script>
</body>
</html>

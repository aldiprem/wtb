<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Website Baru - TopUp Store Manager</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/wtb/static/css/dashboard.css">
    <!-- Base URL for API -->
    <meta name="base-url" content="https://climb-gzip-enquiry-other.trycloudflare.com">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>TopUp Store</h2>
                <p>Owner Panel</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/owner/dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/owner/websites" class="active">
                    <i class="fas fa-globe"></i>
                    <span>Websites</span>
                </a>
                <a href="#">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <a href="/owner/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="content-header">
                <div class="header-title">
                    <h1>Buat Website Baru</h1>
                    <p>Isi informasi untuk membuat website toko baru</p>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="content-area">
                <div style="max-width: 800px; margin: 0 auto;">
                    <form id="createWebsiteForm" style="background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                        <!-- Informasi Dasar -->
                        <h3 style="font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem;">Informasi Dasar</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Nama Website *</label>
                            <input type="text" class="form-control" name="name" required placeholder="Contoh: TopUp Game Store">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Deskripsi</label>
                            <textarea class="form-control" name="description" rows="3" placeholder="Deskripsi singkat tentang website"></textarea>
                        </div>
                        
                        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Mata Uang</label>
                                <select class="form-control" name="currency">
                                    <option value="IDR">IDR - Rupiah</option>
                                    <option value="USD">USD - Dollar</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Warna Tema</label>
                                <input type="color" class="form-control" name="theme_color" value="#4f46e5" style="height: 44px;">
                            </div>
                        </div>
                        
                        <!-- Kontak -->
                        <h3 style="font-size: 1.2rem; font-weight: 600; margin: 2rem 0 1.5rem;">Informasi Kontak</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Nomor WhatsApp</label>
                            <input type="text" class="form-control" name="whatsapp_number" placeholder="Contoh: 628123456789">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" placeholder="admin@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Telepon</label>
                            <input type="text" class="form-control" name="phone" placeholder="021-1234567">
                        </div>
                        
                        <!-- Bot Telegram -->
                        <h3 style="font-size: 1.2rem; font-weight: 600; margin: 2rem 0 1.5rem;">Bot Telegram (Opsional)</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Token Bot</label>
                            <input type="text" class="form-control" name="telegram_bot_token" placeholder="Masukkan token dari @BotFather">
                        </div>
                        
                        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Username Bot</label>
                                <input type="text" class="form-control" name="telegram_bot_username" placeholder="@namabot">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Chat ID Admin</label>
                                <input type="text" class="form-control" name="telegram_chat_id" placeholder="ID Telegram untuk notifikasi">
                            </div>
                        </div>
                        
                        <!-- Meta Tags -->
                        <h3 style="font-size: 1.2rem; font-weight: 600; margin: 2rem 0 1.5rem;">SEO Settings</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Meta Title</label>
                            <input type="text" class="form-control" name="meta_title" placeholder="Judul untuk SEO">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Meta Description</label>
                            <textarea class="form-control" name="meta_description" rows="2" placeholder="Deskripsi untuk SEO"></textarea>
                        </div>
                        
                        <!-- Actions -->
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="submit" class="btn btn-primary" style="flex: 1;">
                                <i class="fas fa-save mr-2"></i>
                                Simpan Website
                            </button>
                            <a href="/owner/websites" class="btn btn-secondary" style="flex: 0 0 120px;">
                                Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Spinner -->
    <div class="global-loader" style="display: none;">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Dashboard JS -->
    <script src="/static/js/dashboard.js"></script>
    <script>
        document.getElementById('createWebsiteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            // Show loading
            document.querySelector('.global-loader').style.display = 'flex';
            
            try {
                const response = await fetch('/wtb/owner/websites/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Website berhasil dibuat!');
                    window.location.href = result.redirect;
                } else {
                    alert(result.message || 'Gagal membuat website');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.querySelector('.global-loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>Giveaway</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/giveaway/css/giveaway.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <button class="back-btn" id="backToLobbyBtn">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Container -->
    <div class="giveaway-container">
        
        <!-- Header Card dengan Profile -->
        <div class="profile-card">
            <div class="profile-left">
                <div class="profile-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="userName">Memuat...</div>
                    <div class="profile-username" id="userUsername">@username</div>
                </div>
            </div>
            <div class="stats-right" id="statsContainer">
                <div class="stat-item">
                    <i class="fas fa-gift"></i>
                    <span class="stat-value" id="statCreated">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-users"></i>
                    <span class="stat-value" id="statParticipated">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-trophy"></i>
                    <span class="stat-value" id="statWon">0</span>
                </div>
            </div>
        </div>

        <!-- Countdown Card with 3D Glow Effect -->
        <div class="countdown-card">
            <div class="countdown-label">
                <i class="fas fa-hourglass-half"></i>
                <span>Berakhir Dalam</span>
            </div>
            
            <div class="countdown-timer" id="countdownTimer">
                <!-- Hari -->
                <div class="countdown-block">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-unit">Hari</span>
                </div>

                <div class="countdown-separator">:</div>

                <!-- Jam -->
                <div class="countdown-block">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-unit">Jam</span>
                </div>

                <div class="countdown-separator">:</div>

                <!-- Menit -->
                <div class="countdown-block">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-unit">Menit</span>
                </div>

                <div class="countdown-separator">:</div>

                <!-- Detik -->
                <div class="countdown-block">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-unit">Detik</span>
                </div>
            </div>

            <div class="expired-message" id="expiredMessage" style="display: none;">
                <i class="fas fa-clock"></i>
                <span>Giveaway telah berakhir!</span>
            </div>
        </div>

        <!-- Prize Card -->
        <div class="prize-card">
            <div class="card-header">
                <i class="fas fa-trophy"></i>
                <h3>Hadiah Giveaway</h3>
            </div>
            <div class="prize-list" id="prizeList"></div>
            <div class="prize-more" id="prizeMore" style="display: none;">
                <button class="btn-more" id="showAllPrizesBtn">
                    <span id="remainingPrizesCount">0</span> Hadiah Lainnya...
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- All Prizes Modal -->
        <div class="modal-overlay" id="prizeModal">
            <div class="modal-container">
                <div class="modal-header">
                    <h3><i class="fas fa-gift"></i> Semua Hadiah</h3>
                    <button class="modal-close" id="closePrizeModal">&times;</button>
                </div>
                <div class="modal-body" id="allPrizesList"></div>
            </div>
        </div>

        <!-- Requirements Card -->
        <div class="requirements-card" id="requirementsCard">
            <div class="card-header">
                <i class="fas fa-clipboard-list"></i>
                <h3>Syarat</h3>
            </div>
            <div class="requirements-list" id="requirementsList"></div>
        </div>

        <!-- Chat Card - Update dengan struktur seperti Prize Card -->
        <div class="chat-info-card" id="chatInfoCard" style="display: none;">
            <div class="card-header">
                <i class="fas fa-users"></i>
                <h3>Chat ID</h3>
                <button class="chat-refresh-btn" id="refreshChatBtn" style="margin-left: auto;">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="chat-list-container" id="chatListContainer"></div>
            <div class="chat-more" id="chatMore" style="display: none;">
                <button class="btn-more" id="showAllChatsBtn">
                    <span id="remainingChatsCount">0</span> Chat Lainnya...
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- All Chats Modal -->
        <div class="modal-overlay" id="allChatsModal">
            <div class="modal-container">
                <div class="modal-header">
                    <h3><i class="fas fa-users"></i> Semua Chat</h3>
                    <button class="modal-close" id="closeAllChatsModalBtn">&times;</button>
                </div>
                <div class="modal-body" id="allChatsList"></div>
            </div>
        </div>

        <!-- Links Card (Tap Link Requirement) -->
        <div class="links-card" id="linksCard" style="display: none;">
            <div class="card-header">
                <i class="fas fa-link"></i>
                <h3>Link Wajib</h3>
            </div>
            <div class="links-container" id="linksContainer"></div>
            <div class="links-status" id="linksStatus" style="display: none;"></div>
        </div>
        
        <!-- Participation Status Card -->
        <div class="status-card" id="participationStatus" style="display: none;">
            <i class="fas fa-check-circle"></i>
            <div class="status-text">
                <h4>Sudah Berpartisipasi!</h4>
                <p>Terima kasih telah mengikuti giveaway ini. Semoga beruntung!</p>
            </div>
        </div>

        <!-- Participation Avatars Card -->
        <div class="participation-avatars-card" id="participationAvatarsCard" style="display: none;">
            <div class="avatars-header">
                <div class="avatars-stack" id="avatarsStack"></div>
            </div>
        </div>

        <!-- All Participants Modal -->
        <div class="modal-overlay" id="participantsModal">
            <div class="modal-container" style="max-width: 340px;">
                <div class="modal-header" style="padding: 12px 16px;">
                    <h3 style="font-size: 14px;"><i class="fas fa-users"></i> Daftar Peserta</h3>
                    <button class="modal-close" id="closeParticipantsModal">&times;</button>
                </div>
                <div class="modal-body" id="participantsListContainer" style="padding: 12px 16px;"></div>
            </div>
        </div>

        <!-- Floating Action Button (FAB) -->
        <div class="fab-container" id="fabContainer">
            <button class="fab-button" id="participateBtn" disabled>
                <i class="fas fa-hand-peace"></i>
                <span>Partisipasi</span>
            </button>
        </div>

    </div>

    <!-- JavaScript -->
    <script src="/giveaway/js/giveaway.js"></script>
</body>
</html>

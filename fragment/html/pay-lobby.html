<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pembayaran - Fragment Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/fragment/css/pay-lobby.css">
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <i class="fas fa-qrcode"></i>
            <h2>Pembayaran Bot Clone</h2>
            <p>Scan QRIS untuk menyelesaikan pembayaran</p>
        </div>
        
        <div class="order-info" id="orderInfo">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
        
        <div class="qris-section">
            <div class="qris-image" id="qrisContainer">
                <div class="qris-placeholder">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Memuat QRIS...</p>
                </div>
            </div>
            <button class="btn-copy" id="copyBtn" style="display: none;">
                <i class="fas fa-copy"></i> Salin QRIS
            </button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="status-section">
            <span id="statusBadge" class="status-badge status-pending">
                <i class="fas fa-clock"></i> Menunggu Pembayaran
            </span>
        </div>
        
        <button id="checkPaymentBtn" class="btn-check">
            <i class="fas fa-search"></i> Sudah Bayar
        </button>
        
        <div class="timer">
            Sisa waktu: <span id="countdown">--:--:--</span>
        </div>
    </div>

    <script src="/fragment/js/pay-lobby.js"></script>
</body>
</html>
